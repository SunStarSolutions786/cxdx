<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>CXDX · Prescription to Conversion, Reconciled</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230E7C7B%22/><path d=%22M18 55 L36 55 L44 30 L56 72 L64 45 L72 55 L84 55%22 stroke=%22white%22 stroke-width=%228%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CXDX DESIGN SYSTEM — "Pulse Ledger"
   Clinical teal + paper background, amber leakage / green
   conversion semantics, animated ECG pulse as signature motif.
   ============================================================ */
:root{
  --ink-900:#0B1F26;
  --ink-800:#122A31;
  --ink-700:#1C3438;
  --teal-700:#0B6665;
  --teal-600:#0E7C7B;
  --teal-500:#14948F;
  --teal-400:#3FB0AB;
  --teal-100:#DCF0EE;
  --teal-50:#EFF8F7;
  --green-600:#178A56;
  --green-500:#1FAA6D;
  --green-100:#DEF3E8;
  --amber-600:#B5620D;
  --amber-500:#DE7F1E;
  --amber-100:#FBEAD4;
  --red-600:#DC2626;
  --red-100:#FDE4E4;
  --paper-50:#F5F8F7;
  --paper-0:#FFFFFF;
  --line-200:#DCE6E4;
  --line-100:#EAF1EF;
  --slate-600:#3F5257;
  --slate-500:#5B7278;
  --slate-400:#7E9297;
  --slate-300:#A7B8BB;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:22px;
  --shadow-sm:0 1px 3px rgba(11,31,38,0.07);
  --shadow-md:0 6px 20px rgba(11,31,38,0.08);
  --shadow-lg:0 16px 40px rgba(11,31,38,0.14);
  --ease:cubic-bezier(.4,0,.2,1);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font-body);
  background:var(--paper-50);
  color:var(--ink-900);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
a{color:inherit;}
::selection{background:var(--teal-100);color:var(--teal-700);}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
}

/* ---------- Scrollbar ---------- */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line-200);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--slate-300);}

/* ---------- Utility ---------- */
.hidden{display:none !important;}
.mono{font-family:var(--font-mono);}
.u-flex{display:flex;}
.u-between{display:flex;align-items:center;justify-content:space-between;}
.u-gap-8{gap:8px;} .u-gap-12{gap:12px;} .u-gap-16{gap:16px;}
.u-muted{color:var(--slate-500);}
.u-center{display:flex;align-items:center;justify-content:center;}
.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============================================================
   PULSE LOGO — signature motif, reused sparingly
   ============================================================ */
.pulse-logo{display:inline-flex;align-items:center;gap:10px;}
.pulse-logo .mark{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(155deg,var(--teal-600),var(--ink-800));
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);flex-shrink:0;
}
.pulse-logo .mark svg{width:24px;height:24px;overflow:visible;}
.pulse-logo .mark path{
  fill:none;stroke:#fff;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:120;stroke-dashoffset:120;
  animation:draw-pulse 1.6s var(--ease) 0.2s forwards;
}
@keyframes draw-pulse{to{stroke-dashoffset:0;}}
.pulse-logo .wordmark{
  font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:0.5px;
  background:linear-gradient(100deg,var(--ink-900) 30%,var(--teal-600) 70%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.pulse-logo.on-dark .wordmark{
  background:linear-gradient(100deg,#fff 30%,var(--teal-400) 75%);
  -webkit-background-clip:text;background-clip:text;
}
.pulse-logo .tagline{font-size:11px;color:var(--slate-400);letter-spacing:0.3px;margin-top:1px;}

/* traveling highlight dot loop on the pulse path, used on login hero */
.pulse-trace{position:relative;width:100%;max-width:360px;height:34px;margin:0 auto;}
.pulse-trace svg{width:100%;height:100%;overflow:visible;}
.pulse-trace path{
  fill:none;stroke:var(--teal-500);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:6 460;stroke-dashoffset:0;
  animation:trace-run 3.2s linear infinite;
  opacity:0.85;
}
.pulse-trace path.ghost{stroke:var(--line-200);stroke-dasharray:none;opacity:1;animation:none;stroke-width:1.5;}
@keyframes trace-run{
  0%{stroke-dasharray:6 460;stroke-dashoffset:0;}
  85%{stroke-dasharray:6 460;stroke-dashoffset:-460;}
  100%{stroke-dasharray:6 460;stroke-dashoffset:-466;}
}

/* ============================================================
   LOGIN
   ============================================================ */
#login-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;background:var(--paper-50);
}
#login-screen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(600px 300px at 15% 0%, var(--teal-100) 0%, transparent 60%),
    radial-gradient(500px 260px at 100% 100%, var(--amber-100) 0%, transparent 55%);
  opacity:0.7;pointer-events:none;
}
.login-hero{position:relative;text-align:center;margin-bottom:28px;animation:rise-in 0.7s var(--ease) both;}
.login-hero .pulse-logo{justify-content:center;transform:scale(1.15);margin-bottom:10px;}
.login-hero h1{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--slate-500);letter-spacing:0.2px;margin-top:6px;}
.login-card{
  position:relative;width:100%;max-width:388px;background:var(--paper-0);
  border:1px solid var(--line-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  padding:32px 30px 28px;animation:rise-in 0.7s var(--ease) 0.1s both;
}
@keyframes rise-in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.login-card .field{margin-bottom:16px;}
.login-card label{display:block;font-size:12.5px;font-weight:600;color:var(--slate-600);margin-bottom:6px;letter-spacing:0.15px;}
.login-card input{
  width:100%;padding:11px 13px;border:1.5px solid var(--line-200);border-radius:var(--radius-sm);
  background:var(--paper-50);transition:border-color var(--transition),background var(--transition);
}
.login-card input:focus{outline:none;border-color:var(--teal-500);background:var(--paper-0);}
#login-error{
  display:none;background:var(--red-100);color:var(--red-600);font-size:13px;font-weight:500;
  padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:14px;
}
.login-foot{text-align:center;margin-top:22px;}
.login-foot .pulse-trace{opacity:0.8;}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;font-weight:600;border-radius:var(--radius-sm);border:1.5px solid transparent;
  padding:10px 18px;transition:transform 120ms var(--ease),box-shadow var(--transition),background var(--transition),border-color var(--transition),opacity var(--transition);
  white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-block{width:100%;}
.btn-primary{background:linear-gradient(120deg,var(--teal-600),var(--teal-700));color:#fff;box-shadow:0 2px 10px rgba(14,124,123,0.28);}
.btn-primary:hover{box-shadow:0 4px 16px rgba(14,124,123,0.36);}
.btn-secondary{background:var(--paper-0);color:var(--ink-900);border-color:var(--line-200);}
.btn-secondary:hover{border-color:var(--teal-400);color:var(--teal-700);}
.btn-ghost{background:transparent;color:var(--slate-600);}
.btn-ghost:hover{background:var(--line-100);}
.btn-danger{background:var(--paper-0);color:var(--red-600);border-color:var(--red-100);}
.btn-danger:hover{background:var(--red-100);}
.btn-danger-solid{background:var(--red-600);color:#fff;}
.btn-danger-solid:hover{background:#c41f1f;}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:7px;}
.btn:disabled{opacity:0.55;cursor:not-allowed;}
.btn svg{width:16px;height:16px;flex-shrink:0;}
.icon-btn{
  width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
  background:transparent;border:1.5px solid transparent;color:var(--slate-500);transition:all var(--transition);
}
.icon-btn:hover{background:var(--line-100);color:var(--ink-900);}
.icon-btn.danger:hover{background:var(--red-100);color:var(--red-600);}
.icon-btn svg{width:17px;height:17px;}

/* ============================================================
   APP SHELL
   ============================================================ */
#app-shell{display:flex;min-height:100vh;}
#sidebar{
  width:242px;flex-shrink:0;background:var(--ink-900);color:#fff;
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;
  transition:transform var(--transition);
}
#sidebar .side-head{padding:22px 20px 16px;}
#sidebar .pulse-logo{transform:scale(0.92);transform-origin:left center;}
.company-chip{
  margin:2px 20px 14px;padding:9px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;font-size:12px;color:var(--teal-400);display:flex;align-items:center;gap:7px;
}
.company-chip svg{width:14px;height:14px;flex-shrink:0;}
.company-chip b{color:#fff;font-weight:600;display:block;font-size:12.5px;}
nav.side-nav{flex:1;padding:6px 12px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;margin-bottom:2px;
  color:rgba(255,255,255,0.62);font-size:13.5px;font-weight:500;position:relative;
  transition:background var(--transition),color var(--transition);
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:rgba(20,148,143,0.22);color:#fff;}
.nav-item.active::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;
  background:var(--teal-400);border-radius:0 3px 3px 0;
}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:rgba(255,255,255,0.32);padding:14px 12px 6px;font-weight:600;}
#sidebar .side-foot{padding:14px 20px 18px;border-top:1px solid rgba(255,255,255,0.08);}
.user-chip{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.user-avatar{
  width:34px;height:34px;border-radius:50%;background:linear-gradient(140deg,var(--teal-500),var(--teal-700));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;
}
.user-chip .who{overflow:hidden;}
.user-chip .who .nm{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .who .rl{font-size:11px;color:rgba(255,255,255,0.45);text-transform:capitalize;}
.sidebar-pulse{height:26px;margin-top:6px;opacity:0.5;}
.sidebar-pulse svg{width:100%;height:100%;}
.sidebar-pulse path{fill:none;stroke:var(--teal-400);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:4 300;animation:trace-run 4s linear infinite;}

#main-col{margin-left:242px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;}
#topbar{
  height:64px;flex-shrink:0;background:var(--paper-0);border-bottom:1px solid var(--line-200);
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:30;
}
#topbar .crumb{font-family:var(--font-display);font-weight:600;font-size:16.5px;display:flex;align-items:center;gap:10px;}
#topbar .crumb .sub{font-family:var(--font-body);font-weight:400;font-size:12.5px;color:var(--slate-400);}
#menu-toggle{display:none;}
#content{flex:1;padding:26px;max-width:1360px;width:100%;}
.view{animation:fade-up 0.35s var(--ease) both;}
@keyframes fade-up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.page-head h2{font-family:var(--font-display);font-size:21px;font-weight:600;}
.page-head p{color:var(--slate-500);font-size:13.5px;margin-top:3px;}
.page-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* ============================================================
   CARDS / STATS
   ============================================================ */
.card{background:var(--paper-0);border:1px solid var(--line-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);}
.card-pad{padding:22px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line-100);}
.card-head h3{font-family:var(--font-display);font-size:15px;font-weight:600;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{
  background:var(--paper-0);border:1px solid var(--line-200);border-radius:var(--radius-md);padding:18px 20px;
  transition:transform var(--transition),box-shadow var(--transition);position:relative;overflow:hidden;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card .lbl{font-size:11.5px;font-weight:600;color:var(--slate-500);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;}
.stat-card .val{font-family:var(--font-mono);font-size:26px;font-weight:600;margin-top:8px;color:var(--ink-900);}
.stat-card .delta{font-size:12px;margin-top:5px;font-weight:600;}
.stat-card.accent-teal{border-top:3px solid var(--teal-500);}
.stat-card.accent-green{border-top:3px solid var(--green-500);}
.stat-card.accent-amber{border-top:3px solid var(--amber-500);}
.stat-card.accent-ink{border-top:3px solid var(--ink-700);}
.stat-card .val.c-green{color:var(--green-600);}
.stat-card .val.c-amber{color:var(--amber-600);}

/* ============================================================
   FORMS
   ============================================================ */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.field-wrap{display:flex;flex-direction:column;gap:6px;}
.field-wrap.span-2{grid-column:span 2;}
.field-wrap label{font-size:12.5px;font-weight:600;color:var(--slate-600);}
.field-wrap label .req{color:var(--amber-600);}
.field-wrap .hint{font-size:11px;color:var(--slate-400);}
.field-wrap .err{font-size:11.5px;color:var(--red-600);display:none;font-weight:500;}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=date],input[type=month],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--line-200);border-radius:var(--radius-sm);
  background:var(--paper-0);color:var(--ink-900);transition:border-color var(--transition);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal-500);}
input.invalid,select.invalid{border-color:var(--red-600);}
select{appearance:none;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235B7278' stroke-width='2.5'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:32px;}
textarea{resize:vertical;min-height:64px;}
input.uhid-input{text-transform:uppercase;font-family:var(--font-mono);letter-spacing:0.5px;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--slate-600);}

.test-row{
  display:grid;grid-template-columns:1fr 130px 130px 34px;gap:10px;align-items:end;margin-bottom:10px;
  padding:12px;background:var(--paper-50);border-radius:var(--radius-sm);border:1px solid var(--line-100);
}
.test-row .field-wrap label{font-size:11px;}
#add-test-row-btn{margin-top:2px;}

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--line-200);background:var(--paper-0);}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;}
thead th{
  text-align:left;padding:12px 16px;background:var(--paper-50);color:var(--slate-600);font-weight:600;
  font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--line-200);white-space:nowrap;
  position:sticky;top:0;
}
tbody td{padding:12px 16px;border-bottom:1px solid var(--line-100);white-space:nowrap;color:var(--ink-900);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background var(--transition);}
tbody tr:hover{background:var(--paper-50);}
tbody td.num,thead th.num{text-align:right;font-family:var(--font-mono);}
td.uhid-cell{font-family:var(--font-mono);letter-spacing:0.3px;font-weight:600;}
tr.total-row td{background:var(--amber-100);font-weight:700;border-top:2px solid var(--amber-500);border-bottom:2px solid var(--amber-500);}
tr.total-row{position:sticky;bottom:0;}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:0.2px;}
.badge svg{width:11px;height:11px;}
.badge.matched{background:var(--green-100);color:var(--green-600);}
.badge.leakage{background:var(--amber-100);color:var(--amber-600);}
.badge.neutral{background:var(--line-100);color:var(--slate-500);}
.badge.active{background:var(--green-100);color:var(--green-600);}
.badge.inactive{background:var(--red-100);color:var(--red-600);}

.table-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;flex-wrap:wrap;}
.search-box{position:relative;min-width:220px;flex:1;max-width:320px;}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--slate-400);}
.search-box input{padding-left:34px;}
.pill-filters{display:flex;gap:8px;flex-wrap:wrap;}
.pill{padding:6px 13px;border-radius:99px;font-size:12.5px;font-weight:600;border:1.5px solid var(--line-200);color:var(--slate-500);background:var(--paper-0);transition:all var(--transition);}
.pill.active{background:var(--ink-900);border-color:var(--ink-900);color:#fff;}

.empty-state{text-align:center;padding:56px 24px;color:var(--slate-500);}
.empty-state svg{width:46px;height:46px;color:var(--slate-300);margin:0 auto 14px;}
.empty-state h4{font-family:var(--font-display);font-size:15.5px;color:var(--ink-900);margin-bottom:5px;}
.empty-state p{font-size:13px;max-width:340px;margin:0 auto;}

/* ============================================================
   MODAL / TOAST / OVERLAY
   ============================================================ */
#modal-root{position:fixed;inset:0;z-index:100;display:none;}
#modal-root.show{display:block;}
.modal-backdrop{position:absolute;inset:0;background:rgba(11,31,38,0.42);backdrop-filter:blur(2px);animation:fade-in 0.2s var(--ease);}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.modal-box{
  position:relative;max-width:560px;width:calc(100% - 32px);margin:6vh auto;max-height:88vh;overflow-y:auto;
  background:var(--paper-0);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  animation:modal-in 0.25s var(--ease);
}
.modal-box.wide{max-width:760px;}
@keyframes modal-in{from{opacity:0;transform:translateY(10px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line-100);position:sticky;top:0;background:var(--paper-0);z-index:2;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.modal-head h3{font-family:var(--font-display);font-size:17px;font-weight:600;}
.modal-body{padding:22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line-100);position:sticky;bottom:0;background:var(--paper-0);border-radius:0 0 var(--radius-lg) var(--radius-lg);}

#toast-stack{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px;}
.toast{
  background:var(--ink-900);color:#fff;padding:13px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:toast-in 0.3s var(--ease);
}
.toast svg{width:17px;height:17px;flex-shrink:0;}
.toast.success{background:var(--green-600);}
.toast.error{background:var(--red-600);}
.toast.info{background:var(--ink-800);}
@keyframes toast-in{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}

   ============================================================ */
.section-label{font-size:11.5px;font-weight:700;color:var(--teal-700);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:block;}
.divider{height:1px;background:var(--line-100);margin:18px 0;}
.map-row{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:10px;margin-bottom:10px;}
.map-row .arrow{color:var(--slate-400);}
.map-row .field-name{font-size:13px;font-weight:600;color:var(--ink-900);display:flex;align-items:center;gap:6px;}
.map-row .field-name .req-dot{width:6px;height:6px;border-radius:50%;background:var(--amber-500);}
.file-drop{
  border:2px dashed var(--line-200);border-radius:var(--radius-md);padding:26px;text-align:center;
  transition:all var(--transition);cursor:pointer;background:var(--paper-50);
}
.file-drop:hover,.file-drop.drag{border-color:var(--teal-500);background:var(--teal-50);}
.file-drop svg{width:30px;height:30px;color:var(--teal-500);margin:0 auto 8px;}
.file-drop .fname{font-family:var(--font-mono);font-size:12.5px;color:var(--teal-700);margin-top:6px;}

.month-tile{
  display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--line-200);
  border-radius:var(--radius-md);margin-bottom:10px;transition:all var(--transition);background:var(--paper-0);
}
.month-tile:hover{box-shadow:var(--shadow-sm);}
.month-tile .m-name{font-family:var(--font-display);font-weight:600;font-size:14.5px;}
.month-tile .m-meta{font-size:11.5px;color:var(--slate-500);margin-top:2px;}

.progress-track{height:8px;border-radius:99px;background:var(--line-100);overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green-500),var(--teal-500));transition:width 0.6s var(--ease);}
.progress-fill.leak{background:linear-gradient(90deg,var(--amber-500),var(--amber-600));}

.loader-ring{width:20px;height:20px;border:2.5px solid var(--line-200);border-top-color:var(--teal-500);border-radius:50%;animation:spin 0.7s linear infinite;}
.skeleton{background:linear-gradient(90deg,var(--line-100) 25%,var(--line-200) 37%,var(--line-100) 63%);background-size:400% 100%;animation:sk-loop 1.4s ease infinite;border-radius:6px;}
@keyframes sk-loop{0%{background-position:100% 0;}100%{background-position:0 0;}}

.chart-legend{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.chart-legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--slate-600);font-weight:500;}
.chart-legend .dot{width:9px;height:9px;border-radius:50%;}

.role-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.4px;}
.role-tag.superadmin{background:var(--ink-800);color:var(--teal-400);}
.role-tag.admin{background:var(--teal-100);color:var(--teal-700);}

#global-loader{position:fixed;inset:0;background:var(--paper-50);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}

    const epoch = new Date(Date.UTC(1899, 11, 30));
    const d = new Date(epoch.getTime() + value * 86400000);
    return isoFromParts(d.getUTCFullYear(), d.getUTCMonth()+1, d.getUTCDate());
  }
  const s = String(value).trim();
  let m;
  if ((m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/))) return isoFromParts(+m[1], +m[2], +m[3]);
  if ((m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/))) {
    const a = +m[1], b = +m[2];
    if (a > 12) return isoFromParts(+m[3], b, a); // DD-MM-YYYY
    return isoFromParts(+m[3], a, b); // ambiguous -> assume DD-MM-YYYY (common outside US); adjust in Settings if needed
  }
  if ((m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/))) return isoFromParts(2000 + (+m[3]), +m[2] > 12 ? +m[1] : +m[2], +m[2] > 12 ? +m[2] : +m[1]);
  const d = new Date(s);
  if (!isNaN(d)) return isoFromParts(d.getFullYear(), d.getMonth()+1, d.getDate());
  return null;
}
function isoFromParts(y, m, d) { if(!y||!m||!d) return null; return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }

function animateCountUp(el, target, opts) {
  const isMoney = opts && opts.money, isPct = opts && opts.pct;
  const start = 0, dur = 900, t0 = performance.now();
  function frame(t) {
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = start + (target - start) * eased;
    el.textContent = isMoney ? formatMoney(val) : isPct ? formatPct(val) : formatNum(Math.round(val));
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ---- Toasts ---- */
function showToast(message, type) {
  type = type || 'info';
  const stack = $('#toast-stack');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const iconName = type === 'success' ? 'checkCircle' : type === 'error' ? 'alertTriangle' : 'info';
  t.innerHTML = icon(iconName) + '<span>' + escapeHtml(message) + '</span>';
  stack.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(30px)'; t.style.transition = 'all .25s ease'; setTimeout(() => t.remove(), 260); }, 3600);
}

/* ---- Modal ---- */
function openModal(innerHtml, opts) {
  opts = opts || {};
  $('#modal-slot').innerHTML = `<div class="modal-box${opts.wide ? ' wide' : ''}">${innerHtml}</div>`;
  $('#modal-root').classList.add('show');
}
function closeModal() { $('#modal-root').classList.remove('show'); $('#modal-slot').innerHTML = ''; }
$('#modal-backdrop').addEventListener('click', closeModal);

function confirmDialog(title, message, confirmLabel, danger) {
  return new Promise((resolve) => {
    openModal(`
      <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="icon-btn" id="cd-x">${icon('x')}</button></div>
      <div class="modal-body"><p style="font-size:14px;color:var(--slate-600);line-height:1.55;">${escapeHtml(message)}</p></div>
      <div class="modal-foot"><button class="btn btn-ghost" id="cd-cancel">Cancel</button><button class="btn ${danger ? 'btn-danger-solid' : 'btn-primary'}" id="cd-ok">${escapeHtml(confirmLabel || 'Confirm')}</button></div>
    `);
    const done = (v) => { closeModal(); resolve(v); };
    $('#cd-x').onclick = () => done(false);
    $('#cd-cancel').onclick = () => done(false);
    $('#cd-ok').onclick = () => done(true);
  });
}

function setBtnLoading(btn, loading, labelWhenDone) {
  if (loading) { btn.dataset.label = btn.innerHTML; btn.innerHTML = '<span class="loader-ring" style="border-color:rgba(255,255,255,.4);border-top-color:#fff;width:16px;height:16px;"></span>'; btn.disabled = true; }
  else { btn.innerHTML = labelWhenDone || btn.dataset.label || btn.innerHTML; btn.disabled = false; }
}

function friendlyError(e) {
  const code = (e && e.code) || '';
  const map = {
    'auth/invalid-email': 'That email address looks invalid.',
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-credential': 'Incorrect email or password.',
    'auth/email-already-in-use': 'An account with that email already exists.',
    'auth/weak-password': 'Password should be at least 6 characters.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
    'permission-denied': "You don't have permission to do that.",
  };
  return map[code] || (e && e.message ? e.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/,'') : 'Something went wrong.');
}

async function loadCompanyContext(companyId) {
  const snap = await getDoc(doc(db, 'companies', companyId));
  if (!snap.exists()) throw new Error('Company not found. Contact your Super Admin.');
  const data = snap.data();
  state.companyId = companyId;
  state.companyName = data.name;
  state.companyActive = data.active !== false;
  state.matchingConfig = Object.assign({}, DEFAULT_MATCHING_CONFIG, data.matchingConfig || {}, { billingMap: Object.assign({}, DEFAULT_MATCHING_CONFIG.billingMap, (data.matchingConfig || {}).billingMap || {}) });
  await loadMasters();
}

async function loadUserProfile(fbUser) {
  const snap = await getDoc(doc(db, 'users', fbUser.uid));
  if (!snap.exists()) throw new Error('NO_PROFILE');
  const data = snap.data();
  return { uid: fbUser.uid, email: fbUser.email, name: data.name || fbUser.email, role: data.role, companyId: data.companyId || null };
}

function beginSession() {
  onAuthStateChanged(auth, async (fbUser) => {
    if (!fbUser) { state.user = null; showLoginScreen(); return; }
    try {
      const profile = await loadUserProfile(fbUser);
      state.user = profile;
      state.isSuperAdmin = profile.role === 'superadmin';
      if (profile.role === 'admin') {
        if (!profile.companyId) throw new Error('Your account is not linked to a company yet. Contact your Super Admin.');
        await loadCompanyContext(profile.companyId);
      }
      renderShellChrome();
      showAppShell();
      navigateTo(state.isSuperAdmin ? 'sa-companies' : 'dashboard');
    } catch (err) {
      console.error(err);
      showToast(err.message === 'NO_PROFILE' ? 'No profile found for this account. Contact your Super Admin.' : friendlyError(err), 'error');
      await signOut(auth);
      showLoginScreen();
    }
  });
}

async function deleteAllInCollection(colRef) {
  const snap = await getDocs(colRef);
  let batch = writeBatch(db), n = 0;
  for (const d of snap.docs) { batch.delete(d.ref); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
  if (n > 0) await batch.commit();
  return snap.docs;
}
async function deleteCompanyCascade(companyId) {
  const dumpsSnap = await getDocs(collection(db, 'companies', companyId, 'billingDumps'));
  for (const dDoc of dumpsSnap.docs) await deleteAllInCollection(collection(db, 'companies', companyId, 'billingDumps', dDoc.id, 'rows'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'billingDumps'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'prescriptions'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'doctors'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'tests'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'agents'));
  const usersSnap = await getDocs(query(collection(db, 'users'), where('companyId', '==', companyId)));
  if (usersSnap.docs.length) { const b = writeBatch(db); usersSnap.docs.forEach(d => b.delete(d.ref)); await b.commit(); }
  await deleteDoc(doc(db, 'companies', companyId));
  // Note: the linked Firebase Auth sign-in accounts themselves are not deletable from the client
  // SDK for security reasons — remove them from Firebase Console → Authentication if desired.
}

async function loadAllPrescriptions() {
  const snap = await getDocs(query(collection(db, 'companies', state.companyId, 'prescriptions'), orderBy('date', 'desc')));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
function computeSummaryStats(rows) {
  const distinctVisits = new Set(rows.map(r => (r.uhid || '') + '|' + (r.date || '')));
  const totalTestGiven = rows.length;
  const matched = rows.filter(r => r.matchStatus === 'matched');
  const prescriptionValue = rows.reduce((s, r) => s + toNum(r.testAmount), 0);
  const conversionValue = matched.reduce((s, r) => s + toNum(r.matchedAmount), 0);
  const leakageRows = rows.filter(r => r.matchStatus !== 'matched');
  const leakageValue = leakageRows.reduce((s, r) => s + toNum(r.testAmount), 0);
  return {
    totalPrescription: distinctVisits.size, totalTestGiven, totalConversion: matched.length,
    totalLeakageCount: totalTestGiven - matched.length, prescriptionValue, conversionValue, leakageValue,
    conversionPct: prescriptionValue > 0 ? (conversionValue / prescriptionValue) * 100 : 0,
    leakagePct: prescriptionValue > 0 ? (leakageValue / prescriptionValue) * 100 : 0,
  };
}
function groupByMonth(rows) {
  const map = {};
  rows.forEach(r => { const mk = r.monthKey || monthKeyFromDate(r.date) || 'unknown'; (map[mk] = map[mk] || { rows: [] }).rows.push(r); });
  Object.keys(map).forEach(mk => Object.assign(map[mk], computeSummaryStats(map[mk].rows)));
  return map;
}

function readFileAsRows(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const headers = (XLSX.utils.sheet_to_json(ws, { header: 1 })[0] || []).filter(h => h !== undefined && h !== '');
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        resolve({ headers, rows });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsArrayBuffer(file);
  });
}
function detectColumnMapping(headers, savedMap) {
  const guess = { uhid: '', date: '', amount: '', testName: '', patientName: '' };
  const lower = headers.map(h => (h || '').toString().toLowerCase());
  function find(patterns) { for (const p of patterns) { const idx = lower.findIndex(h => h.includes(p)); if (idx !== -1) return headers[idx]; } return ''; }
  guess.uhid = find(['uhid', 'patient id', 'patientid', 'uh id', 'mrn', 'reg no', 'registration']);
  guess.date = find(['date', 'bill date', 'visit date', 'txn date']);
  guess.amount = find(['amount', 'value', 'bill amt', 'billed', 'net amount', 'total']);
  guess.testName = find(['test name', 'test', 'item', 'service', 'procedure']);
  guess.patientName = find(['patient name', 'patient', 'name']);
  if (savedMap) Object.keys(guess).forEach(k => { if (savedMap[k] && headers.includes(savedMap[k])) guess[k] = savedMap[k]; });
  return guess;
}

    <div class="modal-foot"><button class="btn btn-ghost" id="m-cancel">Cancel</button><button class="btn btn-primary" id="bu-confirm" disabled>${icon('uploadCloud')} Confirm &amp; Upload</button></div>
  `, { wide: true });
  $('#m-x').onclick = closeModal; $('#m-cancel').onclick = closeModal;
  $('#bu-drop').onclick = () => $('#bu-file').click();

  let fileRows = [];
  $('#bu-file').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if (!file) return;
    $('#bu-fname').textContent = file.name;
    try {
      const data = await readFileAsRows(file);
      fileRows = data.rows;
      const guess = detectColumnMapping(data.headers, state.matchingConfig && state.matchingConfig.billingMap);
      renderMappingZone(data.headers, guess);
    } catch (err) { showToast('Could not read that file: ' + friendlyError(err), 'error'); }
  });

  function renderMappingZone(headers, guess) {
    const optionsHtml = (val) => `<option value="">— Not in file —</option>` + headers.map(h => `<option value="${escapeHtml(h)}" ${h === val ? 'selected' : ''}>${escapeHtml(h)}</option>`).join('');
    $('#bu-mapping-zone').innerHTML = `
      <div class="divider"></div><span class="section-label">Map Columns</span>
      <div class="map-row"><div class="field-name"><span class="req-dot"></span>UHID</div><span class="arrow">${icon('chevronRight')}</span><select id="map-uhid">${optionsHtml(guess.uhid)}</select></div>
      <div class="map-row"><div class="field-name"><span class="req-dot"></span>Date</div><span class="arrow">${icon('chevronRight')}</span><select id="map-date">${optionsHtml(guess.date)}</select></div>
      <div class="map-row"><div class="field-name"><span class="req-dot"></span>Amount</div><span class="arrow">${icon('chevronRight')}</span><select id="map-amount">${optionsHtml(guess.amount)}</select></div>
      <div class="map-row"><div class="field-name">Test Name <span class="hint">(optional)</span></div><span class="arrow">${icon('chevronRight')}</span><select id="map-testName">${optionsHtml(guess.testName)}</select></div>
      <div class="map-row"><div class="field-name">Patient Name <span class="hint">(optional)</span></div><span class="arrow">${icon('chevronRight')}</span><select id="map-patientName">${optionsHtml(guess.patientName)}</select></div>
    `;
    ['uhid', 'date', 'amount', 'testName', 'patientName'].forEach(k => $('#map-' + k).addEventListener('change', updatePreview));
    updatePreview();
  }
  function currentMap() { return { uhid: $('#map-uhid').value, date: $('#map-date').value, amount: $('#map-amount').value, testName: $('#map-testName').value, patientName: $('#map-patientName').value }; }
  function updatePreview() {
    const map = currentMap();
    const ok = map.uhid && map.date && map.amount;
    $('#bu-confirm').disabled = !ok;
    if (!ok) { $('#bu-preview-zone').innerHTML = `<p class="u-muted" style="font-size:12.5px;margin-top:10px;">Map UHID, Date, and Amount to continue.</p>`; return; }
    const previewRows = fileRows.slice(0, 5).map(r => ({ uhid: normalizeUHID(r[map.uhid]), date: parseFlexibleDate(r[map.date]), amount: toNum(r[map.amount]), testName: map.testName ? r[map.testName] : '' }));
    $('#bu-preview-zone').innerHTML = `<div class="divider"></div><span class="section-label">Preview (first 5 of ${fileRows.length} rows)</span><div class="table-wrap"><table><thead><tr><th>UHID</th><th>Date</th><th class="num">Amount</th><th>Test Name</th></tr></thead><tbody>${previewRows.map(r => `<tr><td class="uhid-cell">${escapeHtml(r.uhid) || '—'}</td><td>${r.date ? formatDateDisplay(r.date) : '<span style="color:var(--red-600);">unparsed</span>'}</td><td class="num">${formatMoney(r.amount)}</td><td>${escapeHtml(r.testName || '—')}</td></tr>`).join('')}</tbody></table></div>`;
  }

  $('#bu-confirm').onclick = async () => {
    const monthKey = $('#bu-month').value;
    if (!monthKey) { showToast('Select a month', 'error'); return; }
    const map = currentMap();
    if (!map.uhid || !map.date || !map.amount) { showToast('Map UHID, Date, and Amount', 'error'); return; }
    if (!replaceMonthKey) {
      const existingDumpSnap = await getDoc(doc(db, 'companies', state.companyId, 'billingDumps', monthKey));
      if (existingDumpSnap.exists()) {
        const ok = await confirmDialog('Replace existing dump?', `A billing dump already exists for ${monthLabel(monthKey)} with ${existingDumpSnap.data().rowCount || 0} rows. Uploading will delete it and replace it with this file.`, 'Replace', true);
        if (!ok) return;
      }
    }
    const btn = $('#bu-confirm'); setBtnLoading(btn, true);
    try {
      await uploadBillingDump(monthKey, fileRows, map);
      showToast('Billing dump uploaded — running matching…', 'info');
      closeModal();
      const r = await runMatching();
      showToast(`Matching complete — ${r.matchedCount} matched, ${r.leakageCount} leakage`, 'success');
      navigateTo('billing');
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('uploadCloud')} Confirm & Upload`); }
  };
}

async function uploadBillingDump(monthKey, fileRows, map) {
  await deleteAllInCollection(collection(db, 'companies', state.companyId, 'billingDumps', monthKey, 'rows'));
  let batch = writeBatch(db), n = 0, count = 0;
  for (const r of fileRows) {
    const uhidVal = normalizeUHID(r[map.uhid]);
    const dateVal = parseFlexibleDate(r[map.date]);
    if (!uhidVal || !dateVal) continue;
    const rowData = { uhid: uhidVal, date: dateVal, amount: toNum(r[map.amount]), testName: map.testName ? (r[map.testName] || '').toString().trim() : '', patientName: map.patientName ? (r[map.patientName] || '').toString().trim() : '', used: false, usedBy: null };
    batch.set(doc(collection(db, 'companies', state.companyId, 'billingDumps', monthKey, 'rows')), rowData);
    n++; count++;
    if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; }
  }
  if (n > 0) await batch.commit();
  await setDoc(doc(db, 'companies', state.companyId, 'billingDumps', monthKey), { monthKey, rowCount: count, uploadedAt: serverTimestamp() });
  const newConfig = Object.assign({}, state.matchingConfig, { billingMap: map });
  await updateDoc(doc(db, 'companies', state.companyId), { matchingConfig: newConfig });
  state.matchingConfig = newConfig;
}

async function deleteBillingDump(monthKey) {
  const ok = await confirmDialog('Delete billing dump?', `This removes all uploaded billing rows for ${monthLabel(monthKey)}. Prescriptions matched against this data move back to Leakage until re-matched.`, 'Delete', true);
  if (!ok) return;
  try {
    await deleteAllInCollection(collection(db, 'companies', state.companyId, 'billingDumps', monthKey, 'rows'));
    await deleteDoc(doc(db, 'companies', state.companyId, 'billingDumps', monthKey));
    showToast('Billing dump deleted — re-running matching…', 'info');
    await runMatching();
    navigateTo('billing');
  } catch (e) { showToast(friendlyError(e), 'error'); }
}

async function runMatching() {
  const [prescSnap, dumpsSnap] = await Promise.all([
    getDocs(collection(db, 'companies', state.companyId, 'prescriptions')),
    getDocs(collection(db, 'companies', state.companyId, 'billingDumps')),
  ]);
  const prescriptions = prescSnap.docs.map(d => ({ id: d.id, ref: d.ref, ...d.data() }));
  let billingRows = [];
  for (const dDoc of dumpsSnap.docs) {
    const rowsSnap = await getDocs(collection(db, 'companies', state.companyId, 'billingDumps', dDoc.id, 'rows'));
    rowsSnap.docs.forEach(r => billingRows.push({ id: r.id, ref: r.ref, ...r.data() }));
  }
  const windowDays = (state.matchingConfig && state.matchingConfig.windowDays) || 1;
  const byUhid = {};
  billingRows.forEach(b => { (byUhid[b.uhid] = byUhid[b.uhid] || []).push(b); });
  Object.values(byUhid).forEach(list => list.sort((a, b) => (a.date < b.date ? -1 : 1)));

  const usedBillingIds = new Set();
  const prescUpdates = [];
  const sortedPresc = prescriptions.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  for (const p of sortedPresc) {
    const windowEnd = addDaysISO(p.date, windowDays);
    const candidates = (byUhid[p.uhid] || []).filter(b => !usedBillingIds.has(b.id) && b.date >= p.date && b.date <= windowEnd);
    let chosen = null;
    const candidatesWithTestName = candidates.filter(c => c.testName && c.testName.trim());
    if (candidatesWithTestName.length && p.testGiven) {
      // This UHID+date window has test/item-level detail in the billing data —
      // require the prescribed test to actually match one of them (case and
      // extra-whitespace insensitive). No fallback: a same-day billing row
      // for a *different* test must not count as a conversion.
      chosen = candidatesWithTestName.find(c => normalizeForCompare(c.testName) === normalizeForCompare(p.testGiven)) || null;
    } else {
      // No test-name detail available for this UHID+date window (this
      // company's billing format doesn't carry it) — match by UHID + date
      // alone, which is the best available signal.
      chosen = candidates[0] || null;
    }
    if (chosen) { usedBillingIds.add(chosen.id); prescUpdates.push({ ref: p.ref, data: { matchStatus: 'matched', matchedAmount: toNum(chosen.amount), matchedBillingRef: chosen.id } }); }
    else prescUpdates.push({ ref: p.ref, data: { matchStatus: 'leakage', matchedAmount: 0, matchedBillingRef: null } });
  }

  let batch = writeBatch(db), n = 0;
  for (const u of prescUpdates) { batch.update(u.ref, u.data); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
  if (n > 0) await batch.commit();

  batch = writeBatch(db); n = 0;
  for (const b of billingRows) {
    const isUsed = usedBillingIds.has(b.id);
    if (!!b.used !== isUsed) { batch.update(b.ref, { used: isUsed }); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
  }
  if (n > 0) await batch.commit();

  const matchedCount = prescUpdates.filter(u => u.data.matchStatus === 'matched').length;
  return { matchedCount, leakageCount: prescUpdates.length - matchedCount, total: prescUpdates.length };
}

async function renderReportsView(content) {
  $('#topbar-actions').innerHTML = `<button class="btn btn-primary" id="rp-export">${icon('download')} Export Excel</button>`;
  content.innerHTML = `<div class="view">
    <div class="pill-filters" id="rp-tabs" style="margin-bottom:18px;">
      <button class="pill active" data-t="summary">Monthly Summary</button>
      <button class="pill" data-t="datewise">Date-wise Detail</button>

  </div>`;
  const rows = await loadAllPrescriptions();
  state.prescriptions = rows;
  const monthly = groupByMonth(rows);
  const overall = computeSummaryStats(rows);
  let rpTab = 'summary';
  function renderBody() { if (rpTab === 'summary') renderMonthlySummaryTable(monthly, overall); else renderDateWiseTable(rows); }
  renderBody();
  $$('#rp-tabs .pill').forEach(p => p.addEventListener('click', () => { $$('#rp-tabs .pill').forEach(x => x.classList.remove('active')); p.classList.add('active'); rpTab = p.dataset.t; renderBody(); }));
  $('#rp-export').addEventListener('click', () => exportReportsExcel(monthly, overall, rows));
}

function renderMonthlySummaryTable(monthly, overall) {
  const months = Object.keys(monthly).filter(m => m !== 'unknown').sort();
  $('#rp-body').innerHTML = `<div class="card"><div class="table-wrap"><table><thead><tr>
    <th>Month</th><th class="num">Total Prescription</th><th class="num">Total Test Given</th><th class="num">Total Conversion Test</th>
    <th class="num">Prescription Value</th><th class="num">Conversion Value</th><th class="num">Leakage</th><th class="num">Conversion %</th><th class="num">Leakage %</th>
  </tr></thead><tbody>
    <tr class="total-row"><td>Total</td><td class="num">${formatNum(overall.totalPrescription)}</td><td class="num">${formatNum(overall.totalTestGiven)}</td><td class="num">${formatNum(overall.totalConversion)}</td><td class="num">${formatMoney(overall.prescriptionValue)}</td><td class="num">${formatMoney(overall.conversionValue)}</td><td class="num">${formatMoney(overall.leakageValue)}</td><td class="num">${formatPct(overall.conversionPct)}</td><td class="num">${formatPct(overall.leakagePct)}</td></tr>
    ${months.length ? months.map(mk => { const s = monthly[mk]; return `<tr><td>${monthLabel(mk)}</td><td class="num">${formatNum(s.totalPrescription)}</td><td class="num">${formatNum(s.totalTestGiven)}</td><td class="num">${formatNum(s.totalConversion)}</td><td class="num">${formatMoney(s.prescriptionValue)}</td><td class="num">${formatMoney(s.conversionValue)}</td><td class="num">${formatMoney(s.leakageValue)}</td><td class="num">${formatPct(s.conversionPct)}</td><td class="num">${formatPct(s.leakagePct)}</td></tr>`; }).join('') : `<tr><td colspan="9" style="text-align:center;color:var(--slate-400);padding:30px;">No prescription data yet</td></tr>`}
  </tbody></table></div></div>`;
}
function renderDateWiseTable(rows) {
  $('#rp-body').innerHTML = `<div class="card">
    <div class="table-toolbar"><div class="search-box">${icon('search')}<input type="text" id="dw-search" placeholder="Search UHID or patient…"></div></div>
    <div class="table-wrap" id="dw-table-wrap"></div>
    <div id="dw-pager" class="u-between" style="padding:14px 18px;"></div>
  </div>`;
  let page = 1; const PAGE_SIZE = 50;
  function draw() {
    const term = ($('#dw-search').value || '').trim().toUpperCase();
    const filtered = term ? rows.filter(r => ((r.uhid || '') + ' ' + (r.patientName || '')).toUpperCase().includes(term)) : rows;
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    page = Math.min(page, totalPages);
    const pageRows = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
    $('#dw-table-wrap').innerHTML = filtered.length ? `<table><thead><tr><th>Date</th><th>UHID</th><th>Patient</th><th>Consultant</th><th>Test Given</th><th class="num">Test Amount</th><th>Status</th><th class="num">Matched Amount</th><th class="num">Leakage</th><th>Entered By</th>${customFieldsTableHeaderHtml()}</tr></thead><tbody>${pageRows.map(dwRowHtml).join('')}</tbody></table>` : `<div class="empty-state">${icon('inbox')}<h4>No rows</h4></div>`;
    $('#dw-pager').innerHTML = `<span class="u-muted" style="font-size:12.5px;">${filtered.length} rows · Page ${page} of ${totalPages}</span><div class="u-flex u-gap-8"><button class="btn btn-ghost btn-sm" id="dw-prev" ${page <= 1 ? 'disabled' : ''}>‹ Prev</button><button class="btn btn-ghost btn-sm" id="dw-next" ${page >= totalPages ? 'disabled' : ''}>Next ›</button></div>`;
    const pb = $('#dw-prev'), nb = $('#dw-next');
    if (pb) pb.addEventListener('click', () => { page--; draw(); });
    if (nb) nb.addEventListener('click', () => { page++; draw(); });
  }
  $('#dw-search').addEventListener('input', debounce(() => { page = 1; draw(); }, 250));
  draw();
}
function dwRowHtml(r) {
  const matched = r.matchStatus === 'matched';
  return `<tr><td>${formatDateDisplay(r.date)}</td><td class="uhid-cell">${escapeHtml(r.uhid)}</td><td>${escapeHtml(r.patientName)}</td><td>${escapeHtml(r.consultant || '—')}</td><td>${escapeHtml(r.testGiven)}</td><td class="num">${formatMoney(r.testAmount)}</td><td>${matched ? `<span class="badge matched">${icon('check')} Completed</span>` : `<span class="badge leakage">${icon('alertTriangle')} Leakage</span>`}</td><td class="num">${matched ? formatMoney(r.matchedAmount) : '—'}</td><td class="num">${matched ? '—' : formatMoney(r.testAmount)}</td><td>${escapeHtml(r.enteredBy || '—')}</td>${customFieldsTableCellsHtml(r)}</tr>`;
}

function exportReportsExcel(monthly, overall, rows) {
  const months = Object.keys(monthly).filter(m => m !== 'unknown').sort();
  const summaryAoa = [
    ['Month', 'Total Prescription', 'Total Test Given', 'Total Conversion Test', 'Prescription Value', 'Conversion Value', 'Leakage', 'Conversion %', 'Leakage %'],
    ['Total', overall.totalPrescription, overall.totalTestGiven, overall.totalConversion, overall.prescriptionValue, overall.conversionValue, overall.leakageValue, formatPct(overall.conversionPct), formatPct(overall.leakagePct)],
    ...months.map(mk => { const s = monthly[mk]; return [monthLabel(mk), s.totalPrescription, s.totalTestGiven, s.totalConversion, s.prescriptionValue, s.conversionValue, s.leakageValue, formatPct(s.conversionPct), formatPct(s.leakagePct)]; }),
  ];
  const dateWiseAoa = [
    ['Date', 'UHID', 'Patient Name', 'Consultant', 'Test Given', 'Test Amount', 'Status', 'Matched Amount', 'Leakage Amount', 'Entered By', 'Remarks'].concat(customFieldsTemplateHeaders()),
    ...rows.map(r => [r.date, r.uhid, r.patientName, r.consultant || '', r.testGiven, toNum(r.testAmount), r.matchStatus === 'matched' ? 'Completed' : 'Leakage', r.matchStatus === 'matched' ? toNum(r.matchedAmount) : 0, r.matchStatus === 'matched' ? 0 : toNum(r.testAmount), r.enteredBy || '', r.remarks || ''].concat(customFieldsExportValues(r))),
  ];
  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(summaryAoa); ws1['!cols'] = summaryAoa[0].map(() => ({ wch: 19 }));
  const ws2 = XLSX.utils.aoa_to_sheet(dateWiseAoa); ws2['!cols'] = dateWiseAoa[0].map(() => ({ wch: 16 }));
  XLSX.utils.book_append_sheet(wb, ws1, 'Monthly Summary');
  XLSX.utils.book_append_sheet(wb, ws2, 'Date Wise');
  XLSX.writeFile(wb, `CXDX_Report_${(state.companyName || 'Company').replace(/[^a-z0-9]+/gi, '_')}_${todayISO()}.xlsx`);
}

VIEW_RENDERERS['reports'] = renderReportsView;

async function changeOwnPassword(currentPassword, newPassword) {
  const cred = EmailAuthProvider.credential(auth.currentUser.email, currentPassword);
  await reauthenticateWithCredential(auth.currentUser, cred);
  await fbUpdatePassword(auth.currentUser, newPassword);
}

async function renderSettingsView(content) {
  $('#topbar-actions').innerHTML = '';
  const cfg = state.matchingConfig || DEFAULT_MATCHING_CONFIG;
  const mapLabels = { uhid: 'UHID', date: 'Date', amount: 'Amount', testName: 'Test Name', patientName: 'Patient Name' };
  content.innerHTML = `<div class="view" style="max-width:640px;">
    <div class="card card-pad" style="margin-bottom:20px;">
      <h3 style="font-family:var(--font-display);font-weight:600;font-size:15px;margin-bottom:4px;">Matching Rules</h3>

      <div class="field-wrap" style="max-width:280px;margin-bottom:14px;">
        <label>Matching Window (days after prescription date)</label>
        <input type="number" id="st-window" min="0" max="30" value="${cfg.windowDays}">

      </div>
      <button class="btn btn-primary btn-sm" id="st-save-window">${icon('check')} Save &amp; Re-run Matching</button>
      <div class="divider"></div>
      <span class="section-label">Current Billing Column Mapping</span>
      <p class="u-muted" style="font-size:12px;margin-bottom:10px;">Updates automatically each time a billing dump is uploaded for this company.</p>
      ${Object.keys(mapLabels).map(k => `<div class="u-between" style="padding:7px 0;border-bottom:1px solid var(--line-100);font-size:13px;"><span class="u-muted">${mapLabels[k]}</span><span style="font-weight:600;">${cfg.billingMap && cfg.billingMap[k] ? escapeHtml(cfg.billingMap[k]) : '—'}</span></div>`).join('')}
    </div>
    <div class="card card-pad">
      <h3 style="font-family:var(--font-display);font-weight:600;font-size:15px;margin-bottom:14px;">Change Password</h3>
      <div class="field-wrap" style="margin-bottom:12px;max-width:320px;"><label>Current Password</label><input type="password" id="st-cur-pass"></div>
      <div class="field-wrap" style="margin-bottom:14px;max-width:320px;"><label>New Password</label><input type="password" id="st-new-pass" placeholder="Min 6 characters"></div>
      <button class="btn btn-secondary btn-sm" id="st-change-pass">${icon('key')} Update Password</button>
    </div>
  </div>`;

  $('#st-save-window').addEventListener('click', async () => {
    const days = parseInt($('#st-window').value, 10);
    if (isNaN(days) || days < 0) { showToast('Enter a valid number of days', 'error'); return; }
    const btn = $('#st-save-window'); setBtnLoading(btn, true);
    try {
      const newConfig = Object.assign({}, state.matchingConfig, { windowDays: days });
      await updateDoc(doc(db, 'companies', state.companyId), { matchingConfig: newConfig });
      state.matchingConfig = newConfig;
      await runMatching();
      showToast('Matching window updated and re-applied', 'success');
      setBtnLoading(btn, false, `${icon('check')} Save & Re-run Matching`);
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('check')} Save & Re-run Matching`); }
  });

  $('#st-change-pass').addEventListener('click', async () => {
    const cur = $('#st-cur-pass').value, next = $('#st-new-pass').value;
    if (!cur || !next) { showToast('Fill in both fields', 'error'); return; }
    if (next.length < 6) { showToast('New password must be at least 6 characters', 'error'); return; }
    const btn = $('#st-change-pass'); setBtnLoading(btn, true);
    try {
      await changeOwnPassword(cur, next);
      showToast('Password updated', 'success');
      $('#st-cur-pass').value = ''; $('#st-new-pass').value = '';
      setBtnLoading(btn, false, `${icon('key')} Update Password`);
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('key')} Update Password`); }
  });
}
