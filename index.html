    $('#bu-skip-unparsed').addEventListener('change', (e) => { previewSkipUnparsed = e.target.checked; updatePreview(); });
    updatePreview();
  }
  function parseWithFix(raw) {
    if (raw === null || raw === undefined || raw === '') return null;
    if (!previewDateFix) return parseFlexibleDate(raw);
    const s = String(raw).trim();
    if (previewDateFix === 'swapDM') {
      const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
      if (m) return parseFlexibleDate(m[2] + '-' + m[1] + '-' + m[3]);
    }
    return parseFlexibleDate(raw);
  }
  function currentMap() { return { uhid: $('#map-uhid').value, date: $('#map-date').value, amount: $('#map-amount').value, testName: $('#map-testName').value, patientName: $('#map-patientName').value }; }
  function updatePreview() {
    const map = currentMap();
    const ok = map.uhid && map.date && map.amount && map.testName;
    if (!ok) {
      $('#bu-confirm').disabled = true;
      $('#bu-preview-zone').innerHTML = `<p class="u-muted" style="font-size:12.5px;margin-top:10px;">Map UHID, Date, Amount, and Test Name to continue — matching relies on all four.</p>`;
      return;
    }
    // Build parsed preview using current suggested fix and check entire file for unparsed dates
    const parsedAll = fileRows.map(r => ({ uhid: normalizeUHID(r[map.uhid]), date: parseWithFix(r[map.date]), amount: toNum(r[map.amount]), testName: map.testName ? r[map.testName] : '' }));
    const unparsedCount = parsedAll.filter(r => !r.date).length;
    const previewRows = parsedAll.slice(0, 5);
    const blocked = (unparsedCount > 0) && !previewSkipUnparsed;
    $('#bu-confirm').disabled = blocked;
    let banner = '';
    if (unparsedCount > 0) {
      if (previewSkipUnparsed) banner = `<div style="padding:10px;margin-bottom:10px;border-radius:8px;background:var(--amber-100);color:var(--amber-600);font-weight:700;">${unparsedCount} row${unparsedCount>1?'s':''} will be skipped on upload (override enabled).</div>`;
      else banner = `<div style="padding:10px;margin-bottom:10px;border-radius:8px;background:var(--red-100);color:var(--red-600);font-weight:700;">${unparsedCount} row${unparsedCount>1?'s':''} have unparsed dates — fix your file, try a suggested fix, or enable Skip unparsed rows.</div>`;
    }
    $('#bu-preview-zone').innerHTML = `${banner}<div class="divider"></div><span class="section-label">Preview (first 5 of ${fileRows.length} rows)</span><div class="table-wrap"><table><thead><tr><th>UHID</th><th>Date</th><th class="num">Amount</th><th>Test Name</th></tr></thead><tbody>${previewRows.map(r => `<tr${r.date ? '' : ' class="unparsed-row"'}><td class="uhid-cell">${escapeHtml(r.uhid) || '—'}</td><td>${r.date ? formatDateDisplay(r.date) : '<span style="color:var(--red-600);">unparsed</span>'}</td><td class="num">${formatMoney(r.amount)}</td><td>${escapeHtml(r.testName || '—')}</td></tr>`).join('')}</tbody></table></div>`;
  }

  $('#bu-confirm').onclick = async () => {
    const monthKey = $('#bu-month').value;
    if (!monthKey) { showToast('Select a month', 'error'); return; }
    const map = currentMap();
    if (!map.uhid || !map.date || !map.amount || !map.testName) { showToast('Map UHID, Date, Amount, and Test Name', 'error'); return; }
    if (!replaceMonthKey) {
      const existingDumpSnap = await getDoc(doc(db, 'companies', state.companyId, 'billingDumps', monthKey));
      if (existingDumpSnap.exists()) {
        const ok = await confirmDialog('Replace existing dump?', `A billing dump already exists for ${monthLabel(monthKey)} with ${existingDumpSnap.data().rowCount || 0} rows. Uploading will delete it and replace it with this file.`, 'Replace', true);
        if (!ok) return;
      }
    }
    const btn = $('#bu-confirm'); setBtnLoading(btn, true);
    try {
      await uploadBillingDump(monthKey, fileRows, map, { skipUnparsed: previewSkipUnparsed, dateFix: previewDateFix });
      closeModal();
      showToast('Billing dump uploaded. Upload any other months first, then run matching once from the Dashboard — this keeps Firebase usage down.', 'success');
      navigateTo('billing');
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('uploadCloud')} Confirm & Upload`); }
  };
}

async function uploadBillingDump(monthKey, fileRows, map, opts) {
  opts = opts || {};
  const skipUnparsed = !!opts.skipUnparsed;
  const dateFix = opts.dateFix || null;
  await deleteAllInCollection(collection(db, 'companies', state.companyId, 'billingDumps', monthKey, 'rows'));
  let batch = writeBatch(db), n = 0, count = 0, skipped = 0;
  for (const r of fileRows) {
    const uhidVal = normalizeUHID(r[map.uhid]);
    let dateVal = parseFlexibleDate(r[map.date]);
    if (!dateVal && dateFix === 'swapDM') {
      const s = String(r[map.date] || '').trim();
      const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
      if (m) dateVal = parseFlexibleDate(m[2] + '-' + m[1] + '-' + m[3]);
    }
    if (!uhidVal || !dateVal) { if (skipUnparsed) { skipped++; continue; } else continue; }
    const rowData = { uhid: uhidVal, date: dateVal, amount: toNum(r[map.amount]), testName: map.testName ? (r[map.testName] || '').toString().trim() : '', patientName: map.patientName ? (r[map.patientName] || '').toString().trim() : '', used: false };
    batch.set(doc(collection(db, 'companies', state.companyId, 'billingDumps', monthKey, 'rows')), rowData);
    n++; count++;
    if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; }
  }
  if (n > 0) await batch.commit();
  await setDoc(doc(db, 'companies', state.companyId, 'billingDumps', monthKey), { monthKey, rowCount: count, uploadedAt: serverTimestamp() });
  const newConfig = Object.assign({}, state.matchingConfig, { billingMap: map });
  await updateDoc(doc(db, 'companies', state.companyId), { matchingConfig: newConfig });
  state.matchingConfig = newConfig;
  if (skipped > 0) showToast(`${skipped} row${skipped>1?'s':''} were skipped because dates could not be parsed`, 'info');
}

async function deleteBillingDump(monthKey) {
  const ok = await confirmDialog('Delete billing dump?', `This removes all uploaded billing rows for ${monthLabel(monthKey)}. Prescriptions matched against this data move back to Leakage until re-matched.`, 'Delete', true);
  if (!ok) return;
  try {
    await deleteAllInCollection(collection(db, 'companies', state.companyId, 'billingDumps', monthKey, 'rows'));
    await deleteDoc(doc(db, 'companies', state.companyId, 'billingDumps', monthKey));
    showToast('Billing dump deleted — re-running matching…', 'info');
    await runMatching();
    navigateTo('billing');
  } catch (e) { showToast(friendlyError(e), 'error'); }
}

function decideMatch(p, candidateRows, usedIds, windowDays) {
  if (p.testGiven === NO_TEST_LABEL) return { matchStatus: 'no-test', matchedAmount: 0, matchedBillingRef: null, consumedRef: null };
  const isUnlimited = windowDays === -1;
  const windowEnd = isUnlimited ? null : addDaysISO(p.date, windowDays);
  const candidates = candidateRows.filter(b => !usedIds.has(b.id) && b.date >= p.date && (isUnlimited || b.date <= windowEnd));
  const withTestName = candidates.filter(c => c.testName && c.testName.trim());
  let chosen = null;
  if (withTestName.length && p.testGiven) {
    // This UHID+date window has test/item-level detail in the billing data —
    // require the prescribed test to actually match one of them (case and
    // extra-whitespace insensitive). No fallback: a same-day billing row
    // for a *different* test must not count as a conversion.
    chosen = withTestName.find(c => normalizeForCompare(c.testName) === normalizeForCompare(p.testGiven)) || null;
  } else {
    // No test-name detail available for this UHID+date window (this
    // company's billing format doesn't carry it) — match by UHID + date
    // alone, which is the best available signal.
    chosen = candidates[0] || null;
  }
  if (chosen) { usedIds.add(chosen.id); return { matchStatus: 'matched', matchedAmount: toNum(chosen.amount), matchedBillingRef: chosen.id, consumedRef: chosen.ref }; }
  return { matchStatus: 'leakage', matchedAmount: 0, matchedBillingRef: null, consumedRef: null };
}
function windowDaysFromConfig(cfg) {
  const raw = cfg && cfg.windowDays;
  return (raw === undefined || raw === null) ? -1 : raw; // -1 means "unlimited"
}
function currentWindowDays() { return windowDaysFromConfig(state.matchingConfig); }
function canWriteBillingRows() {
  return state.isSuperAdmin || state.user?.role === 'admin' || state.user?.canUploadBilling === true;
}

// companyId/windowDaysOverride let this run against a company other than the one currently
// entered (used by the Super Admin's bulk-delete tools). Both default to the active session.
async function runMatching(companyId, windowDaysOverride) {
  companyId = companyId || state.companyId;
  const [prescSnap, dumpsSnap] = await Promise.all([
    getDocs(collection(db, 'companies', companyId, 'prescriptions')),
    getDocs(collection(db, 'companies', companyId, 'billingDumps')),
  ]);
  const prescriptions = prescSnap.docs.map(d => ({ id: d.id, ref: d.ref, ...d.data() })).filter(p => !p.deleted);
  let billingRows = [];
  for (const dDoc of dumpsSnap.docs) {
    const rowsSnap = await getDocs(collection(db, 'companies', companyId, 'billingDumps', dDoc.id, 'rows'));
    rowsSnap.docs.forEach(r => billingRows.push({ id: r.id, ref: r.ref, ...r.data() }));
  }
  const windowDays = windowDaysOverride !== undefined ? windowDaysOverride : currentWindowDays();
  const byUhid = {};
  billingRows.forEach(b => { (byUhid[b.uhid] = byUhid[b.uhid] || []).push(b); });
  Object.values(byUhid).forEach(list => list.sort((a, b) => (a.date < b.date ? -1 : 1)));

  const usedBillingIds = new Set();
  const prescUpdates = [];
  const sortedPresc = prescriptions.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  for (const p of sortedPresc) {
    // If this prescription contains multiple tests, run matching for each test separately
    const candidatesForUhid = byUhid[p.uhid] || [];
    if (Array.isArray(p.tests) && p.tests.length) {
      const updatedTests = [];
      let totalMatched = 0;
      let anyLeak = false, allMatched = true, allNoTest = true;
      for (const t of p.tests) {
        const pForTest = Object.assign({}, p, { testGiven: t.testGiven, testAmount: t.testAmount });
        const decision = decideMatch(pForTest, candidatesForUhid, usedBillingIds, windowDays);
        updatedTests.push(Object.assign({}, t, { matchStatus: decision.matchStatus, matchedAmount: decision.matchedAmount, matchedBillingRef: decision.matchedBillingRef }));
        totalMatched += decision.matchedAmount || 0;
        if (decision.matchStatus !== 'matched') allMatched = false;
        if (decision.matchStatus !== 'no-test') allNoTest = false;
        if (decision.matchStatus === 'leakage') anyLeak = true;
      }
      const aggStatus = allMatched ? 'matched' : (allNoTest ? 'no-test' : (anyLeak ? 'leakage' : 'leakage'));
      prescUpdates.push({ ref: p.ref, oldRow: p, data: { tests: updatedTests, matchStatus: aggStatus, matchedAmount: totalMatched } });
    } else {
      const decision = decideMatch(p, candidatesForUhid, usedBillingIds, windowDays);
      prescUpdates.push({ ref: p.ref, oldRow: p, data: { matchStatus: decision.matchStatus, matchedAmount: decision.matchedAmount, matchedBillingRef: decision.matchedBillingRef || null } });
    }
  }

  let batch = writeBatch(db), n = 0;
  for (const u of prescUpdates) { batch.update(u.ref, u.data); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
  if (n > 0) await batch.commit();

  if (canWriteBillingRows()) {
    batch = writeBatch(db); n = 0;
    for (const b of billingRows) {
      const isUsed = usedBillingIds.has(b.id);
      if (!!b.used !== isUsed) { batch.update(b.ref, { used: isUsed }); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
    }
    if (n > 0) await batch.commit();
  }

  const matchedCount = prescUpdates.reduce((count, u) => {
    if (Array.isArray(u.data.tests)) return count + u.data.tests.filter(t => t.matchStatus === 'matched').length;
    return count + (u.data.matchStatus === 'matched' ? 1 : 0);
  }, 0);
  const noTestCount = prescUpdates.reduce((count, u) => {
    if (Array.isArray(u.data.tests)) return count + u.data.tests.filter(t => t.matchStatus === 'no-test').length;
    return count + (u.data.matchStatus === 'no-test' ? 1 : 0);
  }, 0);
  const leakageCount = prescUpdates.reduce((count, u) => {
    if (Array.isArray(u.data.tests)) return count + u.data.tests.filter(t => t.matchStatus === 'leakage').length;
    return count + (u.data.matchStatus === 'leakage' ? 1 : 0);
  }, 0);
  const finalRows = sortedPresc.map((p, i) => ({ ...p, matchStatus: prescUpdates[i].data.matchStatus, matchedAmount: prescUpdates[i].data.matchedAmount }));
  await reconcileSummaryDocs(companyId, finalRows);
  if (companyId === state.companyId) invalidatePrescriptionsCache();
  return { matchedCount, leakageCount, noTestCount, total: prescUpdates.length };
}

// Cheap alternative to runMatching() for a handful of just-created/edited
// prescriptions (e.g. one form save). Instead of reading every prescription
// and every billing row for the whole company, it queries only the billing
// rows for the specific UHID(s) involved — a handful of reads instead of
// potentially thousands. Use runMatching() for bulk operations or whenever a
// full, guaranteed-complete re-sync is needed.
async function quickMatchBatch(prescriptionRefs) {
  if (!prescriptionRefs || !prescriptionRefs.length) return;
  const prescDocs = [];
  for (const ref of prescriptionRefs) {
    const snap = await getDoc(ref);
    if (snap.exists()) prescDocs.push({ id: snap.id, ref: snap.ref, ...snap.data() });
  }
  if (!prescDocs.length) return;
  const windowDays = currentWindowDays();
  const isUnlimited = windowDays === -1;
  const dumpsSnap = await getDocs(collection(db, 'companies', state.companyId, 'billingDumps')); // cheap: just month docs
  const monthKeys = dumpsSnap.docs.map(d => d.id).sort();
  const usedInBatch = new Set();
  const prescUpdates = [];

  for (const p of prescDocs.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))) {
    const startMonth = monthKeyFromDate(p.date);
    const endMonth = isUnlimited ? monthKeys[monthKeys.length - 1] || startMonth : monthKeyFromDate(addDaysISO(p.date, windowDays));
    const relevantMonths = monthKeys.filter(mk => mk >= startMonth && mk <= endMonth);
    let candidates = [];
    for (const mk of relevantMonths) {
      const qy = query(collection(db, 'companies', state.companyId, 'billingDumps', mk, 'rows'), where('uhid', '==', p.uhid));
      const rowsSnap = await getDocs(qy);
      rowsSnap.docs.forEach(d => { const row = { id: d.id, ref: d.ref, ...d.data() }; if (!row.used) candidates.push(row); });
    }
    // If this prescription contains multiple tests, match per-test
    if (Array.isArray(p.tests) && p.tests.length) {
      const updatedTests = [];
      let totalMatched = 0; let anyLeak = false, allMatched = true, allNoTest = true;
      for (const t of p.tests) {
        if (t.testGiven === NO_TEST_LABEL) { updatedTests.push(Object.assign({}, t, { matchStatus: 'no-test', matchedAmount: 0, matchedBillingRef: null })); allMatched = false; continue; }
        const pForTest = Object.assign({}, p, { testGiven: t.testGiven, testAmount: t.testAmount });
        const decision = decideMatch(pForTest, candidates, usedInBatch, windowDays);
        updatedTests.push(Object.assign({}, t, { matchStatus: decision.matchStatus, matchedAmount: decision.matchedAmount, matchedBillingRef: decision.matchedBillingRef }));
        totalMatched += decision.matchedAmount || 0;
        if (decision.matchStatus !== 'matched') allMatched = false;
        if (decision.matchStatus !== 'no-test') allNoTest = false;
        if (decision.matchStatus === 'leakage') anyLeak = true;
      }
      const aggStatus = allMatched ? 'matched' : (allNoTest ? 'no-test' : (anyLeak ? 'leakage' : 'leakage'));
      prescUpdates.push({ ref: p.ref, oldRow: p, data: { tests: updatedTests, matchStatus: aggStatus, matchedAmount: totalMatched } });
    } else {
      // legacy single-test row path
      if (p.testGiven === NO_TEST_LABEL) { prescUpdates.push({ ref: p.ref, oldRow: p, data: { matchStatus: 'no-test', matchedAmount: 0, matchedBillingRef: null } }); continue; }
      const decision = decideMatch(p, candidates, usedInBatch, windowDays);
      prescUpdates.push({ ref: p.ref, oldRow: p, data: { matchStatus: decision.matchStatus, matchedAmount: decision.matchedAmount, matchedBillingRef: decision.matchedBillingRef || null, consumedRef: decision.consumedRef } });
    }
  }

  const batch = writeBatch(db);
  prescUpdates.forEach(u => {
    batch.update(u.ref, { matchStatus: u.data.matchStatus, matchedAmount: u.data.matchedAmount, matchedBillingRef: u.data.matchedBillingRef || null });
    if (canWriteBillingRows() && u.data.consumedRef) batch.update(u.data.consumedRef, { used: true });
  });
  // Matching only ever changes matchStatus/matchedAmount on rows that already exist at a fixed
  // uhid+date — it never touches which visit a row belongs to, so no visitDelta is needed here.
  stageSummaryChanges(batch, state.companyId, prescUpdates.map(u => ({ oldRow: u.oldRow, newRow: { ...u.oldRow, matchStatus: u.data.matchStatus, matchedAmount: u.data.matchedAmount } })));
  await batch.commit();
  invalidatePrescriptionsCache();
}

  // Row-level data is only fetched when a tab that actually needs it (Date-wise, or Export) is

  async function getReportRows() {

  </tr></thead><tbody>
    <tr class="total-row"><td>Total</td><td class="num">${formatNum(overall.totalPrescription)}</td><td class="num">${formatNum(overall.totalTestGiven)}</td><td class="num">${formatNum(overall.totalConversion)}</td><td class="num">${formatMoney(overall.prescriptionValue)}</td><td class="num">${formatMoney(overall.conversionValue)}</td><td class="num">${formatMoney(overall.leakageValue)}</td><td class="num">${formatPct(overall.conversionPct)}</td><td class="num">${formatPct(overall.leakagePct)}</td></tr>
    ${months.length ? months.map(mk => { const s = monthly[mk]; return `<tr><td>${monthLabel(mk)}</td><td class="num">${formatNum(s.totalPrescription)}</td><td class="num">${formatNum(s.totalTestGiven)}</td><td class="num">${formatNum(s.totalConversion)}</td><td class="num">${formatMoney(s.prescriptionValue)}</td><td class="num">${formatMoney(s.conversionValue)}</td><td class="num">${formatMoney(s.leakageValue)}</td><td class="num">${formatPct(s.conversionPct)}</td><td class="num">${formatPct(s.leakagePct)}</td></tr>`; }).join('') : `<tr><td colspan="9" style="text-align:center;color:var(--slate-400);padding:30px;">No prescription data yet</td></tr>`}
  </tbody></table></div></div>`;
}
function renderDateWiseTable(rows) {
  $('#rp-body').innerHTML = `<div class="card">
    <div class="table-toolbar"><div class="search-box">${icon('search')}<input type="text" id="dw-search" placeholder="Search UHID or patient…"></div></div>
    <div class="table-wrap" id="dw-table-wrap"></div>
    <div id="dw-pager" class="u-between" style="padding:14px 18px;"></div>
  </div>`;
  let page = 1; const PAGE_SIZE = 50;
  function draw() {
    const term = ($('#dw-search').value || '').trim().toUpperCase();
    const filtered = term ? rows.filter(r => ((r.uhid || '') + ' ' + (r.patientName || '')).toUpperCase().includes(term)) : rows;
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    page = Math.min(page, totalPages);
    const pageRows = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
    $('#dw-table-wrap').innerHTML = filtered.length ? `<table><thead><tr><th>Date</th><th>UHID</th><th>Patient</th><th>Consultant</th><th>Test Given</th><th class="num">Test Amount</th><th>Status</th><th class="num">Matched Amount</th><th class="num">Leakage</th><th>Entered By</th>${customFieldsTableHeaderHtml()}</tr></thead><tbody>${pageRows.map(dwRowHtml).join('')}</tbody></table>` : `<div class="empty-state">${icon('inbox')}<h4>No rows</h4></div>`;
    $('#dw-pager').innerHTML = `<span class="u-muted" style="font-size:12.5px;">${filtered.length} rows · Page ${page} of ${totalPages}</span><div class="u-flex u-gap-8"><button class="btn btn-ghost btn-sm" id="dw-prev" ${page <= 1 ? 'disabled' : ''}>‹ Prev</button><button class="btn btn-ghost btn-sm" id="dw-next" ${page >= totalPages ? 'disabled' : ''}>Next ›</button></div>`;
    const pb = $('#dw-prev'), nb = $('#dw-next');
    if (pb) pb.addEventListener('click', () => { page--; draw(); });
    if (nb) nb.addEventListener('click', () => { page++; draw(); });
  }
  $('#dw-search').addEventListener('input', debounce(() => { page = 1; draw(); }, 250));
  draw();
}
function dwRowHtml(r) {
  // Support both legacy single-test rows and the normalized `tests` array shape.
  const tests = Array.isArray(r.tests) && r.tests.length ? r.tests : (r.testGiven !== undefined ? [{ testGiven: r.testGiven, testAmount: r.testAmount, matchStatus: r.matchStatus, matchedAmount: r.matchedAmount }] : []);
  const testsText = tests.map(t => `${t.testGiven || '—'}${t.testAmount ? ' (' + formatMoney(t.testAmount) + ')' : ''}`).join('<br>');
  const totalAmt = tests.reduce((s, t) => s + toNum(t.testAmount), 0);
  const totalMatched = tests.reduce((s, t) => s + (t.matchStatus === 'matched' ? toNum(t.matchedAmount) : 0), 0);
  const anyLeak = tests.some(t => t.matchStatus === 'leakage');
  const allNoTest = tests.length > 0 && tests.every(t => t.testGiven === NO_TEST_LABEL || t.matchStatus === 'no-test');
  const allMatched = tests.length > 0 && tests.every(t => t.matchStatus === 'matched');
  const pseudoRow = { matchStatus: allMatched ? 'matched' : allNoTest ? 'no-test' : (anyLeak ? 'leakage' : 'leakage') };
  return `<tr><td>${formatDateDisplay(r.date)}</td><td class="uhid-cell">${escapeHtml(r.uhid)}</td><td>${escapeHtml(r.patientName)}</td><td>${escapeHtml(r.consultant || '—')}</td><td>${testsText}</td><td class="num">${formatMoney(totalAmt)}</td><td>${statusBadgeHtml(pseudoRow)}</td><td class="num">${totalMatched > 0 ? formatMoney(totalMatched) : '—'}</td><td class="num">${pseudoRow.matchStatus === 'matched' || pseudoRow.matchStatus === 'no-test' ? '—' : formatMoney(totalAmt)}</td><td>${escapeHtml(r.enteredBy || '—')}</td>${customFieldsTableCellsHtml(r)}</tr>`;
}

// Converts a Firestore Timestamp (the prescription's createdAt) into a real JS Date for Excel export, or '' if absent.
function tsToExcelDateTime(ts) { return (ts && typeof ts.toDate === 'function') ? ts.toDate() : ''; }

function exportReportsExcel(monthly, overall, rows) {
  const months = Object.keys(monthly).filter(m => m !== 'unknown').sort();
  const summaryAoa = [
    ['Month', 'Total Prescription', 'Total Test Given', 'Total Conversion Test', 'Prescription Value', 'Conversion Value', 'Leakage', 'Conversion %', 'Leakage %'],
    ['Total', overall.totalPrescription, overall.totalTestGiven, overall.totalConversion, overall.prescriptionValue, overall.conversionValue, overall.leakageValue, formatPct(overall.conversionPct), formatPct(overall.leakagePct)],
    ...months.map(mk => { const s = monthly[mk]; return [monthLabel(mk), s.totalPrescription, s.totalTestGiven, s.totalConversion, s.prescriptionValue, s.conversionValue, s.leakageValue, formatPct(s.conversionPct), formatPct(s.leakagePct)]; }),
  ];
  // Column order: ... Remarks, Entered On (auto date+time), [custom fields], Entered By (last)
  const dwHeaders = ['Date', 'UHID', 'Patient Name', 'Consultant', 'Test Given', 'Test Amount', 'Status', 'Matched Amount', 'Leakage Amount', 'Remarks', 'Entered On'].concat(customFieldsTemplateHeaders()).concat(['Entered By']);
  const enteredOnColIdx = 10;
  // Flatten each prescription into one or more export rows: one row per test in the visit.
  const dateWiseAoa = [dwHeaders].concat(rows.flatMap(r => {
    const base = [(r.date || ''), r.uhid, r.patientName, r.consultant || ''];
    const tests = Array.isArray(r.tests) && r.tests.length ? r.tests : (r.testGiven !== undefined ? [{ testGiven: r.testGiven, testAmount: r.testAmount, matchStatus: r.matchStatus, matchedAmount: r.matchedAmount }] : [{ testGiven: NO_TEST_LABEL, testAmount: 0, matchStatus: 'no-test', matchedAmount: 0 }]);
    const customVals = customFieldsExportValues(r);
    const enteredOn = tsToExcelDateTime(r.createdAt);
    const enteredBy = r.enteredBy || '';
    return tests.map(t => {
      const testName = t.testGiven || '';
      const testAmount = toNum(t.testAmount);
      const matchedAmt = t.matchStatus === 'matched' ? toNum(t.matchedAmount) : 0;
      const leakageAmt = (t.matchStatus === 'matched' || t.matchStatus === 'no-test') ? 0 : toNum(t.testAmount);
      const status = statusLabel({ matchStatus: t.matchStatus });
      return base.concat([testName, testAmount, status, matchedAmt, leakageAmt, r.remarks || '', enteredOn]).concat(customVals).concat([enteredBy]);
    });
  }));
  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(summaryAoa); ws1['!cols'] = summaryAoa[0].map(() => ({ wch: 19 }));
  const ws2 = XLSX.utils.aoa_to_sheet(dateWiseAoa);
  ws2['!cols'] = dateWiseAoa[0].map(() => ({ wch: 16 }));
  ws2['!cols'][enteredOnColIdx] = { wch: 19 };
  for (let r = 1; r < dateWiseAoa.length; r++) {
    const cellRef = XLSX.utils.encode_cell({ r, c: enteredOnColIdx });
    if (ws2[cellRef] && ws2[cellRef].t === 'd') ws2[cellRef].z = 'yyyy-mm-dd hh:mm';
  }
  XLSX.utils.book_append_sheet(wb, ws1, 'Monthly Summary');
  XLSX.utils.book_append_sheet(wb, ws2, 'Date Wise');
  XLSX.writeFile(wb, `CXDX_Report_${(state.companyName || 'Company').replace(/[^a-z0-9]+/gi, '_')}_${todayISO()}.xlsx`);
}

VIEW_RENDERERS['reports'] = renderReportsView;

/* ---- SECTION: SETTINGS ---- */
async function changeOwnPassword(currentPassword, newPassword) {
  const cred = EmailAuthProvider.credential(auth.currentUser.email, currentPassword);
  await reauthenticateWithCredential(auth.currentUser, cred);
  await fbUpdatePassword(auth.currentUser, newPassword);
}

async function renderSettingsView(content) {
  $('#topbar-actions').innerHTML = '';
  const cfg = state.matchingConfig || DEFAULT_MATCHING_CONFIG;
  const mapLabels = { uhid: 'UHID', date: 'Date', amount: 'Amount', testName: 'Test Name', patientName: 'Patient Name' };
  content.innerHTML = `<div class="view" style="max-width:640px;">
    <div class="card card-pad" style="margin-bottom:20px;">
      <h3 style="font-family:var(--font-display);font-weight:600;font-size:15px;margin-bottom:4px;">Matching Rules</h3>
      <p class="u-muted" style="font-size:12.5px;margin-bottom:16px;">Controls how prescriptions are matched to billing dump rows for ${escapeHtml(state.companyName)}.</p>
      <div class="field-wrap" style="max-width:320px;margin-bottom:10px;">
        <label>Matching Window (days after prescription date)</label>
        <input type="number" id="st-window" min="0" max="365" value="${cfg.windowDays === -1 ? '' : cfg.windowDays}" ${cfg.windowDays === -1 ? 'disabled' : ''}>
        <span class="hint">0 = same day only · 1 = same day or next day</span>
      </div>
      <div class="checkbox-row" style="margin-bottom:16px;">
        <input type="checkbox" id="st-window-unlimited" ${cfg.windowDays === -1 ? 'checked' : ''}>
        <label for="st-window-unlimited" style="margin:0;font-weight:500;">Unlimited — match any billing date on or after the prescription date</label>
      </div>
      <button class="btn btn-primary btn-sm" id="st-save-window">${icon('check')} Save &amp; Re-run Matching</button>
      <div class="divider"></div>
      <span class="section-label">Current Billing Column Mapping</span>
      <p class="u-muted" style="font-size:12px;margin-bottom:10px;line-height:1.5;">Your billing file's columns don't need to be named exactly like this — during upload you map whatever your file calls them (e.g. "MR Number" or "Patient ID") to these standard fields once, and it's remembered for next time.</p>
      <div class="u-between" style="padding:4px 0;font-size:10.5px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:0.4px;"><span>CXDX Field</span><span>Your File's Column</span></div>
      ${Object.keys(mapLabels).map(k => `<div class="u-between" style="padding:7px 0;border-bottom:1px solid var(--line-100);font-size:13px;"><span class="u-muted">${mapLabels[k]}</span><span style="font-weight:600;">${cfg.billingMap && cfg.billingMap[k] ? escapeHtml(cfg.billingMap[k]) : '—'}</span></div>`).join('')}
    </div>
    <div class="card card-pad" style="margin-bottom:20px;">
      <div class="u-between" style="margin-bottom:4px;">
        <h3 style="font-family:var(--font-display);font-weight:600;font-size:15px;">Custom Prescription Fields</h3>
        <button class="btn btn-secondary btn-sm" id="cf-add-btn">${icon('plus')} Add Field</button>
      </div>
      <p class="u-muted" style="font-size:12.5px;margin-bottom:12px;">Extra fields shown only on ${escapeHtml(state.companyName)}'s prescription form, table, template, and export — other companies aren't affected.</p>
      <div id="cf-list">${state.customFields.length ? state.customFields.map(customFieldRowHtml).join('') : `<p class="u-muted" style="font-size:13px;padding:6px 0;">No custom fields yet for this company.</p>`}</div>
    </div>
    <div class="card card-pad">
      <h3 style="font-family:var(--font-display);font-weight:600;font-size:15px;margin-bottom:14px;">Change Password</h3>
      <div class="field-wrap" style="margin-bottom:12px;max-width:320px;"><label>Current Password</label><input type="password" id="st-cur-pass"></div>
      <div class="field-wrap" style="margin-bottom:14px;max-width:320px;"><label>New Password</label><input type="password" id="st-new-pass" placeholder="Min 6 characters"></div>
      <button class="btn btn-secondary btn-sm" id="st-change-pass">${icon('key')} Update Password</button>
    </div>
  </div>`;

  $('#st-window-unlimited').addEventListener('change', (e) => { $('#st-window').disabled = e.target.checked; });

  $('#st-save-window').addEventListener('click', async () => {
    const unlimited = $('#st-window-unlimited').checked;
    const days = unlimited ? -1 : parseInt($('#st-window').value, 10);
    if (!unlimited && (isNaN(days) || days < 0)) { showToast('Enter a valid number of days, or check Unlimited', 'error'); return; }
    const btn = $('#st-save-window'); setBtnLoading(btn, true);
    try {
      const newConfig = Object.assign({}, state.matchingConfig, { windowDays: days });
      await updateDoc(doc(db, 'companies', state.companyId), { matchingConfig: newConfig });
      state.matchingConfig = newConfig;
      await runMatching();
      showToast('Matching window updated and re-applied', 'success');
      setBtnLoading(btn, false, `${icon('check')} Save & Re-run Matching`);
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('check')} Save & Re-run Matching`); }
  });

  $('#cf-add-btn').addEventListener('click', () => openCustomFieldModal());
  state.customFields.forEach(f => {
    const editBtn = document.getElementById('cf-edit-' + f.key);
    const delBtn = document.getElementById('cf-del-' + f.key);
    if (editBtn) editBtn.addEventListener('click', () => openCustomFieldModal(f));
    if (delBtn) delBtn.addEventListener('click', () => deleteCustomField(f));
  });

  $('#st-change-pass').addEventListener('click', async () => {
    const cur = $('#st-cur-pass').value, next = $('#st-new-pass').value;
    if (!cur || !next) { showToast('Fill in both fields', 'error'); return; }
    if (next.length < 6) { showToast('New password must be at least 6 characters', 'error'); return; }
    const btn = $('#st-change-pass'); setBtnLoading(btn, true);
    try {
      await changeOwnPassword(cur, next);
      showToast('Password updated', 'success');
      $('#st-cur-pass').value = ''; $('#st-new-pass').value = '';
      setBtnLoading(btn, false, `${icon('key')} Update Password`);
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('key')} Update Password`); }
  });
}

function customFieldRowHtml(f) {
  const typeLabel = (CUSTOM_FIELD_TYPES.find(t => t.value === f.type) || {}).label || f.type;
  return `<div class="u-between" style="padding:9px 0;border-bottom:1px solid var(--line-100);">
    <div style="min-width:0;"><span style="font-weight:600;font-size:13.5px;">${escapeHtml(f.label)}</span> <span class="badge neutral">${escapeHtml(typeLabel)}</span>${f.required ? ` <span class="badge leakage">Required</span>` : ''}</div>
    <div class="u-flex u-gap-8"><button class="icon-btn" id="cf-edit-${f.key}">${icon('edit')}</button><button class="icon-btn danger" id="cf-del-${f.key}">${icon('trash')}</button></div>
  </div>`;
}

function openCustomFieldModal(existing) {
  const isEdit = !!existing;
  openModal(`
    <div class="modal-head"><h3>${isEdit ? 'Edit' : 'Add'} Custom Field</h3><button class="icon-btn" id="m-x">${icon('x')}</button></div>
    <div class="modal-body">
      <div class="field-wrap" style="margin-bottom:14px;"><label>Field Label <span class="req">*</span></label><input type="text" id="cfm-label" placeholder="e.g. Referral Source" value="${existing ? escapeHtml(existing.label) : ''}"></div>
      <div class="field-wrap" style="margin-bottom:14px;"><label>Type</label><select id="cfm-type">${CUSTOM_FIELD_TYPES.map(t => `<option value="${t.value}" ${existing && existing.type === t.value ? 'selected' : ''}>${t.label}</option>`).join('')}</select></div>
      <div class="field-wrap ${(!existing || existing.type !== 'select') ? 'hidden' : ''}" id="cfm-options-wrap" style="margin-bottom:14px;">
        <label>Dropdown Options</label>
        <input type="text" id="cfm-options" placeholder="Walk-in, Doctor Referral, Online" value="${existing && existing.options ? escapeHtml(existing.options.join(', ')) : ''}">
        <span class="hint">Comma separated</span>
      </div>
      <div class="checkbox-row"><input type="checkbox" id="cfm-required" ${existing && existing.required ? 'checked' : ''}><label for="cfm-required" style="margin:0;">Required field</label></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" id="m-cancel">Cancel</button><button class="btn btn-primary" id="cfm-save">${icon('check')} Save</button></div>
  `);
  $('#m-x').onclick = closeModal; $('#m-cancel').onclick = closeModal;
  $('#cfm-type').addEventListener('change', (e) => { $('#cfm-options-wrap').classList.toggle('hidden', e.target.value !== 'select'); });
  $('#cfm-save').onclick = async () => {
    const label = $('#cfm-label').value.trim();
    const type = $('#cfm-type').value;
    const required = $('#cfm-required').checked;
    if (!label) { showToast('Field label is required', 'error'); return; }
    let options = null;
    if (type === 'select') {
      options = $('#cfm-options').value.split(',').map(s => s.trim()).filter(Boolean);
      if (!options.length) { showToast('Add at least one dropdown option', 'error'); return; }
    }
    const btn = $('#cfm-save'); setBtnLoading(btn, true);
    try {
      const newFields = state.customFields.slice();
      if (isEdit) {
        const idx = newFields.findIndex(f => f.key === existing.key);
        if (idx !== -1) newFields[idx] = Object.assign({}, existing, { label, type, required, options });
      } else {
        const key = slugifyFieldKey(label, newFields);
        newFields.push({ key, label, type, required, options });
      }
      await updateDoc(doc(db, 'companies', state.companyId), { customFields: newFields });
      state.customFields = newFields;
      showToast('Custom field saved', 'success');
      closeModal();
      navigateTo('settings');
    } catch (err) { showToast(friendlyError(err), 'error'); setBtnLoading(btn, false, `${icon('check')} Save`); }
  };
}

async function deleteCustomField(f) {
  const ok = await confirmDialog('Delete this field?', `"${f.label}" will no longer appear on the prescription form for ${state.companyName}. Existing prescriptions that already have a value for it keep that data — it's just hidden.`, 'Delete', true);
  if (!ok) return;
  try {
    const newFields = state.customFields.filter(x => x.key !== f.key);
    await updateDoc(doc(db, 'companies', state.companyId), { customFields: newFields });
    state.customFields = newFields;
    showToast('Field deleted', 'success');
    navigateTo('settings');
  } catch (e) { showToast(friendlyError(e), 'error'); }
}

VIEW_RENDERERS['settings'] = renderSettingsView;

/* ---- SECTION: INIT ---- */
if (CONFIG_IS_PLACEHOLDER) {
  showConfigNeeded();
} else {
  beginSession();
}
