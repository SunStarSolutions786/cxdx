<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CXDX · Prescription vs Conversion Analysis</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230E7C7B%22/><path d=%22M18 55 L36 55 L44 30 L56 72 L64 45 L72 55 L84 55%22 stroke=%22white%22 stroke-width=%228%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CXDX DESIGN SYSTEM — "Pulse Ledger"
   Clinical teal + paper background, amber leakage / green
   conversion semantics, animated ECG pulse as signature motif.
   ============================================================ */
:root{
  --ink-900:#0B1F26;
  --ink-800:#122A31;
  --ink-700:#1C3438;
  --teal-700:#0B6665;
  --teal-600:#0E7C7B;
  --teal-500:#14948F;
  --teal-400:#3FB0AB;
  --teal-100:#DCF0EE;
  --teal-50:#EFF8F7;
  --green-600:#178A56;
  --green-500:#1FAA6D;
  --green-100:#DEF3E8;
  --amber-600:#B5620D;
  --amber-500:#DE7F1E;
  --amber-100:#FBEAD4;
  --red-600:#DC2626;
  --red-100:#FDE4E4;
  --paper-50:#F5F8F7;
  --paper-0:#FFFFFF;
  --line-200:#DCE6E4;
  --line-100:#EAF1EF;
  --slate-600:#3F5257;
  --slate-500:#5B7278;
  --slate-400:#7E9297;
  --slate-300:#A7B8BB;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:22px;
  --shadow-sm:0 1px 3px rgba(11,31,38,0.07);
  --shadow-md:0 6px 20px rgba(11,31,38,0.08);
  --shadow-lg:0 16px 40px rgba(11,31,38,0.14);
  --ease:cubic-bezier(.4,0,.2,1);
  --transition:200ms var(--ease);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font-body);
  background:var(--paper-50);
  color:var(--ink-900);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
a{color:inherit;}
::selection{background:var(--teal-100);color:var(--teal-700);}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
}

/* ---------- Scrollbar ---------- */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line-200);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--slate-300);}

/* ---------- Utility ---------- */
.hidden{display:none !important;}
.mono{font-family:var(--font-mono);}
.u-flex{display:flex;}
.u-between{display:flex;align-items:center;justify-content:space-between;}
.u-gap-8{gap:8px;} .u-gap-12{gap:12px;}
.u-muted{color:var(--slate-500);}
.u-center{display:flex;align-items:center;justify-content:center;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============================================================
   PULSE LOGO — signature motif, reused sparingly
   ============================================================ */
.pulse-logo{display:inline-flex;align-items:center;gap:10px;}
.pulse-logo .mark{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(155deg,var(--teal-600),var(--ink-800));
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);flex-shrink:0;
}
.pulse-logo .mark svg{width:24px;height:24px;overflow:visible;}
.pulse-logo .mark path{
  fill:none;stroke:#fff;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:120;stroke-dashoffset:120;
  animation:draw-pulse 1.6s var(--ease) 0.2s forwards;
}
@keyframes draw-pulse{to{stroke-dashoffset:0;}}
.pulse-logo .wordmark{
  font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:0.5px;
  background:linear-gradient(100deg,var(--ink-900) 30%,var(--teal-600) 70%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.pulse-logo.on-dark .wordmark{
  background:linear-gradient(100deg,#fff 30%,var(--teal-400) 75%);
  -webkit-background-clip:text;background-clip:text;
}
.pulse-logo .tagline{font-size:11px;color:var(--slate-400);letter-spacing:0.3px;margin-top:1px;}

/* traveling highlight dot loop on the pulse path, used on login hero */
.pulse-trace{position:relative;width:100%;max-width:360px;height:34px;margin:0 auto;}
.pulse-trace svg{width:100%;height:100%;overflow:visible;}
.pulse-trace path{
  fill:none;stroke:var(--teal-500);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:6 460;stroke-dashoffset:0;
  animation:trace-run 3.2s linear infinite;
  opacity:0.85;
}
.pulse-trace path.ghost{stroke:var(--line-200);stroke-dasharray:none;opacity:1;animation:none;stroke-width:1.5;}
@keyframes trace-run{
  0%{stroke-dasharray:6 460;stroke-dashoffset:0;}
  85%{stroke-dasharray:6 460;stroke-dashoffset:-460;}
  100%{stroke-dasharray:6 460;stroke-dashoffset:-466;}
}

/* Compact traveling-pulse loading state for the Run Matching button — same technique as
   .pulse-trace above, sized to sit inline in a button. Path length is 76.5 units. */
.btn-pulse-trace{display:inline-flex;align-items:center;}
.btn-pulse-trace svg{width:44px;height:16px;overflow:visible;}
.btn-pulse-trace path{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.btn-pulse-trace path.ghost{stroke:var(--teal-100);}
.btn-pulse-trace path.run{stroke:var(--teal-700);stroke-dasharray:4 76;stroke-dashoffset:0;animation:btn-trace-run 1.4s linear infinite;}
@keyframes btn-trace-run{
  0%{stroke-dashoffset:0;}
  85%{stroke-dashoffset:-76;}
  100%{stroke-dashoffset:-80;}
}
@media (prefers-reduced-motion: reduce){.btn-pulse-trace path.run{animation:none;stroke-dasharray:none;}}

/* ============================================================
   LOGIN
   ============================================================ */
#login-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;background:var(--paper-50);
}
#login-screen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(600px 300px at 15% 0%, var(--teal-100) 0%, transparent 60%),
    radial-gradient(500px 260px at 100% 100%, var(--amber-100) 0%, transparent 55%);
  opacity:0.7;pointer-events:none;
}
.login-hero{position:relative;text-align:center;margin-bottom:28px;animation:rise-in 0.7s var(--ease) both;}
.login-hero .pulse-logo{justify-content:center;transform:scale(1.15);margin-bottom:10px;}
.login-hero h1{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--slate-500);letter-spacing:0.2px;margin-top:6px;}
.login-card{
  position:relative;width:100%;max-width:388px;background:var(--paper-0);
  border:1px solid var(--line-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  padding:32px 30px 28px;animation:rise-in 0.7s var(--ease) 0.1s both;
}
@keyframes rise-in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.login-card .field{margin-bottom:16px;}
.login-card label{display:block;font-size:12.5px;font-weight:600;color:var(--slate-600);margin-bottom:6px;letter-spacing:0.15px;}
.login-card input{
  width:100%;padding:11px 13px;border:1.5px solid var(--line-200);border-radius:var(--radius-sm);
  background:var(--paper-50);transition:border-color var(--transition),background var(--transition);
}
.login-card input:focus{outline:none;border-color:var(--teal-500);background:var(--paper-0);}
#login-error{
  display:none;background:var(--red-100);color:var(--red-600);font-size:13px;font-weight:500;
  padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:14px;
}
.login-foot{text-align:center;margin-top:22px;}
.login-foot .pulse-trace{opacity:0.8;}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;font-weight:600;border-radius:var(--radius-sm);border:1.5px solid transparent;
  padding:10px 18px;transition:transform 120ms var(--ease),box-shadow var(--transition),background var(--transition),border-color var(--transition),opacity var(--transition);
  white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-block{width:100%;}
.btn-primary{background:linear-gradient(120deg,var(--teal-600),var(--teal-700));color:#fff;box-shadow:0 2px 10px rgba(14,124,123,0.28);}
.btn-primary:hover{box-shadow:0 4px 16px rgba(14,124,123,0.36);}
.btn-secondary{background:var(--paper-0);color:var(--ink-900);border-color:var(--line-200);}
.btn-secondary:hover{border-color:var(--teal-400);color:var(--teal-700);}
.btn-ghost{background:transparent;color:var(--slate-600);}
.btn-ghost:hover{background:var(--line-100);}
.btn-danger{background:var(--paper-0);color:var(--red-600);border-color:var(--red-100);}
.btn-danger:hover{background:var(--red-100);}
.btn-danger-solid{background:var(--red-600);color:#fff;}
.btn-danger-solid:hover{background:#c41f1f;}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:7px;}
.btn:disabled{opacity:0.55;cursor:not-allowed;}
.btn svg{width:16px;height:16px;flex-shrink:0;}
.icon-btn{
  width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
  background:transparent;border:1.5px solid transparent;color:var(--slate-500);transition:all var(--transition);
}
.icon-btn:hover{background:var(--line-100);color:var(--ink-900);}
.icon-btn.danger:hover{background:var(--red-100);color:var(--red-600);}
.icon-btn svg{width:17px;height:17px;}

/* ============================================================
   APP SHELL
   ============================================================ */
#app-shell{display:flex;min-height:100vh;}
#sidebar{
  width:242px;flex-shrink:0;background:var(--ink-900);color:#fff;
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;
  transition:transform var(--transition);
}
#sidebar .side-head{padding:22px 20px 16px;}
#sidebar .pulse-logo{transform:scale(0.92);transform-origin:left center;}
.company-chip{
  margin:2px 20px 14px;padding:9px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;font-size:12px;color:var(--teal-400);display:flex;align-items:center;gap:7px;
}
.company-chip svg{width:14px;height:14px;flex-shrink:0;}
.company-chip b{color:#fff;font-weight:600;display:block;font-size:12.5px;}
nav.side-nav{flex:1;padding:6px 12px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;margin-bottom:2px;
  color:rgba(255,255,255,0.62);font-size:13.5px;font-weight:500;position:relative;
  transition:background var(--transition),color var(--transition);
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:rgba(20,148,143,0.22);color:#fff;}
.nav-item.active::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;
  background:var(--teal-400);border-radius:0 3px 3px 0;
}
#sidebar .side-foot{padding:14px 20px 18px;border-top:1px solid rgba(255,255,255,0.08);}
.user-chip{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.user-avatar{
  width:34px;height:34px;border-radius:50%;background:linear-gradient(140deg,var(--teal-500),var(--teal-700));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;
}
.user-chip .who{overflow:hidden;}
.user-chip .who .nm{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .who .rl{font-size:11px;color:rgba(255,255,255,0.45);text-transform:capitalize;}
.sidebar-pulse{height:26px;margin-top:6px;opacity:0.5;}
.sidebar-pulse svg{width:100%;height:100%;}
.sidebar-pulse path{fill:none;stroke:var(--teal-400);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:4 300;animation:trace-run 4s linear infinite;}

#main-col{margin-left:242px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;}
#topbar{
  height:64px;flex-shrink:0;background:var(--paper-0);border-bottom:1px solid var(--line-200);
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:30;
}
#topbar .crumb{font-family:var(--font-display);font-weight:600;font-size:16.5px;display:flex;align-items:center;gap:10px;}
#topbar .crumb .sub{font-family:var(--font-body);font-weight:400;font-size:12.5px;color:var(--slate-400);}
#menu-toggle{display:none;}
#content{flex:1;padding:26px;max-width:1360px;width:100%;}
.view{animation:fade-up 0.35s var(--ease) both;}
@keyframes fade-up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ============================================================
   CARDS / STATS
   ============================================================ */
.card{background:var(--paper-0);border:1px solid var(--line-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);}
.card-pad{padding:22px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line-100);}
.card-head h3{font-family:var(--font-display);font-size:15px;font-weight:600;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{
  background:var(--paper-0);border:1px solid var(--line-200);border-radius:var(--radius-md);padding:18px 20px;
  transition:transform var(--transition),box-shadow var(--transition);position:relative;overflow:hidden;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card .lbl{font-size:11.5px;font-weight:600;color:var(--slate-500);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;}
.stat-card .val{font-family:var(--font-mono);font-size:26px;font-weight:600;margin-top:8px;color:var(--ink-900);}
.stat-card .delta{font-size:12px;margin-top:5px;font-weight:600;}
.stat-card.accent-teal{border-top:3px solid var(--teal-500);}
.stat-card.accent-green{border-top:3px solid var(--green-500);}
.stat-card.accent-amber{border-top:3px solid var(--amber-500);}
.stat-card.accent-ink{border-top:3px solid var(--ink-700);}
.stat-card .val.c-green{color:var(--green-600);}
.stat-card .val.c-amber{color:var(--amber-600);}

/* ---------- Dashboard stat icon badges (colorful, animated) ---------- */
.stat-icon-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:6px;flex-shrink:0;
  animation:statBadgePulse 2.6s ease-in-out infinite;
  transition:transform .3s var(--ease),box-shadow .3s var(--ease);
}
.stat-icon-badge svg{width:12px;height:12px;stroke:#fff;stroke-width:2.6;}
.stat-card:hover .stat-icon-badge{transform:scale(1.14) translateY(-1px);animation-play-state:paused;box-shadow:0 5px 12px 0 var(--glow);}
.stat-icon-badge.badge-ink{background:linear-gradient(135deg,var(--ink-700),var(--ink-900));--glow:rgba(11,31,38,.5);}
.stat-icon-badge.badge-teal{background:linear-gradient(135deg,var(--teal-400),var(--teal-700));--glow:rgba(14,148,143,.5);}
.stat-icon-badge.badge-green{background:linear-gradient(135deg,#42D68C,var(--green-600));--glow:rgba(23,138,86,.5);}
.stat-icon-badge.badge-amber{background:linear-gradient(135deg,#F7AC4D,var(--amber-600));--glow:rgba(181,98,13,.5);}
@keyframes statBadgePulse{
  0%,100%{box-shadow:0 2px 5px -1px var(--glow);}
  50%{box-shadow:0 3px 10px 0 var(--glow);}
}
@media (prefers-reduced-motion: reduce){.stat-icon-badge{animation:none;}}

/* ============================================================
   FORMS
   ============================================================ */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.field-wrap{display:flex;flex-direction:column;gap:6px;}
.hint{font-size:11.5px;color:var(--slate-400);}
.banner-icon{width:18px;height:18px;flex-shrink:0;}
.banner-icon svg{width:18px;height:18px;}
.field-wrap.span-2{grid-column:span 2;}
.field-wrap label{font-size:12.5px;font-weight:600;color:var(--slate-600);}
.field-wrap label .req{color:var(--amber-600);}
.field-wrap .hint{font-size:11px;color:var(--slate-400);}
.field-wrap .err{font-size:11.5px;color:var(--red-600);display:none;font-weight:500;}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=date],input[type=month],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--line-200);border-radius:var(--radius-sm);
  background:var(--paper-0);color:var(--ink-900);transition:border-color var(--transition);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal-500);}
input.invalid,select.invalid{border-color:var(--red-600);}
select{appearance:none;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235B7278' stroke-width='2.5'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:32px;}

.search-select{position:relative;}
.search-select .ss-input{cursor:text;}
.search-select .ss-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--paper-0);border:1.5px solid var(--line-200);
  border-radius:var(--radius-sm);box-shadow:var(--shadow-md);max-height:230px;overflow-y:auto;z-index:60;
}
.search-select .ss-option{padding:9px 12px;font-size:13.5px;cursor:pointer;color:var(--ink-900);}
.search-select .ss-option:hover,.search-select .ss-option.active{background:var(--teal-50);}
.search-select .ss-empty{padding:9px 12px;font-size:13px;color:var(--slate-400);}
textarea{resize:vertical;min-height:64px;}
input.uhid-input{text-transform:uppercase;font-family:var(--font-mono);letter-spacing:0.5px;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--slate-600);}

.test-row{
  display:grid;grid-template-columns:1fr 140px 34px;gap:10px;align-items:end;margin-bottom:10px;
  padding:14px 14px 14px 40px;background:var(--paper-50);border-radius:var(--radius-sm);border:1px solid var(--line-100);position:relative;
}
.test-row .field-wrap label{font-size:11px;}
.test-row .row-num{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;
  background:var(--teal-100);color:var(--teal-700);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
#add-test-row-btn{margin-top:2px;}

.form-page{max-width:760px;margin:0 auto;}
.tests-summary-pill{
  display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--teal-700);
  background:var(--teal-50);border:1px solid var(--teal-100);padding:5px 12px;border-radius:99px;
}
.form-section-icon{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--teal-100);color:var(--teal-700);margin-right:8px;}
.form-section-icon svg{width:14px;height:14px;}

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--line-200);background:var(--paper-0);}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;}
thead th{
  text-align:left;padding:12px 16px;background:var(--paper-50);color:var(--slate-600);font-weight:600;
  font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--line-200);white-space:nowrap;
  position:sticky;top:0;
}
tbody td{padding:12px 16px;border-bottom:1px solid var(--line-100);white-space:nowrap;color:var(--ink-900);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background var(--transition);}
tbody tr:hover{background:var(--paper-50);}
tbody td.num,thead th.num{text-align:right;font-family:var(--font-mono);}
td.uhid-cell{font-family:var(--font-mono);letter-spacing:0.3px;font-weight:600;}
tr.total-row td{background:var(--amber-100);font-weight:700;border-top:2px solid var(--amber-500);border-bottom:2px solid var(--amber-500);}
tr.total-row{position:sticky;bottom:0;}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:0.2px;}
.badge svg{width:11px;height:11px;}
.badge.matched{background:var(--green-100);color:var(--green-600);}
.badge.leakage{background:var(--amber-100);color:var(--amber-600);}
.badge.neutral{background:var(--line-100);color:var(--slate-500);}
.badge.active{background:var(--green-100);color:var(--green-600);}
.badge.inactive{background:var(--red-100);color:var(--red-600);}

.table-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;flex-wrap:wrap;}
.search-box{position:relative;min-width:220px;flex:1;max-width:320px;}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--slate-400);}
.search-box input{padding-left:34px;}
.pill-filters{display:flex;gap:8px;flex-wrap:wrap;}
.pill{padding:6px 13px;border-radius:99px;font-size:12.5px;font-weight:600;border:1.5px solid var(--line-200);color:var(--slate-500);background:var(--paper-0);transition:all var(--transition);}
.pill.active{background:var(--ink-900);border-color:var(--ink-900);color:#fff;}

.empty-state{text-align:center;padding:56px 24px;color:var(--slate-500);}
.empty-state svg{width:46px;height:46px;color:var(--slate-300);margin:0 auto 14px;}
.empty-state h4{font-family:var(--font-display);font-size:15.5px;color:var(--ink-900);margin-bottom:5px;}
.empty-state p{font-size:13px;max-width:340px;margin:0 auto;}
/* Highlight rows in billing upload preview whose date couldn't be parsed */
.unparsed-row td{background:var(--red-100);color:var(--red-600);} 

/* ============================================================
   MODAL / TOAST / OVERLAY
   ============================================================ */
#modal-root{position:fixed;inset:0;z-index:100;display:none;}
#modal-root.show{display:block;}
.modal-backdrop{position:absolute;inset:0;background:rgba(11,31,38,0.42);backdrop-filter:blur(2px);animation:fade-in 0.2s var(--ease);}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.modal-box{
  position:relative;max-width:560px;width:calc(100% - 32px);margin:6vh auto;max-height:88vh;overflow-y:auto;
  background:var(--paper-0);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  animation:modal-in 0.25s var(--ease);
}
.modal-box.wide{max-width:760px;}
@keyframes modal-in{from{opacity:0;transform:translateY(10px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line-100);position:sticky;top:0;background:var(--paper-0);z-index:2;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.modal-head h3{font-family:var(--font-display);font-size:17px;font-weight:600;}
.modal-body{padding:22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line-100);position:sticky;bottom:0;background:var(--paper-0);border-radius:0 0 var(--radius-lg) var(--radius-lg);}

#toast-stack{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px;}
.toast{
  background:var(--ink-900);color:#fff;padding:13px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:toast-in 0.3s var(--ease);
}
.toast svg{width:17px;height:17px;flex-shrink:0;}
.toast.success{background:var(--green-600);}
.toast.error{background:var(--red-600);}
.toast.info{background:var(--ink-800);}
@keyframes toast-in{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}

#save-flash{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(11,31,38,.32);opacity:0;pointer-events:none;transition:opacity .2s var(--ease);}
#save-flash.show{opacity:1;}
.save-flash-card{background:var(--paper-0);border-radius:var(--radius-lg);padding:30px 42px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:var(--shadow-lg);transform:scale(.86);transition:transform .3s var(--ease);}
#save-flash.show .save-flash-card{transform:scale(1);}
.save-flash-check{width:56px;height:56px;}
.save-flash-check circle{fill:none;stroke:var(--green-500);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:151;stroke-dashoffset:151;}
.save-flash-check path{fill:none;stroke:var(--green-500);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:36;stroke-dashoffset:36;}
#save-flash.show .save-flash-check circle{animation:sf-circle .4s var(--ease) forwards;}
#save-flash.show .save-flash-check path{animation:sf-check .25s var(--ease) .35s forwards;}
@keyframes sf-circle{to{stroke-dashoffset:0;}}
@keyframes sf-check{to{stroke-dashoffset:0;}}
.save-flash-text{font-family:var(--font-display);font-weight:600;font-size:15.5px;color:var(--ink-900);}
@media (prefers-reduced-motion: reduce){#save-flash,.save-flash-card,.save-flash-check circle,.save-flash-check path{animation:none !important;transition:none !important;}}

/* ============================================================
   MISC: chips, stepper, mapping ui, charts, loaders
   ============================================================ */
.section-label{font-size:11.5px;font-weight:700;color:var(--teal-700);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:block;}
.chevron-icon{display:inline-flex;}
.chevron-icon svg{transition:transform 200ms var(--ease);}
.divider{height:1px;background:var(--line-100);margin:18px 0;}
.map-row{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:10px;margin-bottom:10px;}
.map-row .arrow{color:var(--slate-400);}
.map-row .field-name{font-size:13px;font-weight:600;color:var(--ink-900);display:flex;align-items:center;gap:6px;}
.map-row .field-name .req-dot{width:6px;height:6px;border-radius:50%;background:var(--amber-500);}
.file-drop{
  border:2px dashed var(--line-200);border-radius:var(--radius-md);padding:26px;text-align:center;
  transition:all var(--transition);cursor:pointer;background:var(--paper-50);
}
.file-drop:hover,.file-drop.drag{border-color:var(--teal-500);background:var(--teal-50);}
.file-drop svg{width:30px;height:30px;color:var(--teal-500);margin:0 auto 8px;}
.file-drop .fname{font-family:var(--font-mono);font-size:12.5px;color:var(--teal-700);margin-top:6px;}

.month-tile{
  display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--line-200);
  border-radius:var(--radius-md);margin-bottom:10px;transition:all var(--transition);background:var(--paper-0);
}
.month-tile:hover{box-shadow:var(--shadow-sm);}
.month-tile .m-name{font-family:var(--font-display);font-weight:600;font-size:14.5px;}
.month-tile .m-meta{font-size:11.5px;color:var(--slate-500);margin-top:2px;}

.progress-track{height:8px;border-radius:99px;background:var(--line-100);overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green-500),var(--teal-500));transition:width 0.6s var(--ease);}
.progress-fill.leak{background:linear-gradient(90deg,var(--amber-500),var(--amber-600));}

.loader-ring{width:20px;height:20px;border:2.5px solid var(--line-200);border-top-color:var(--teal-500);border-radius:50%;animation:spin 0.7s linear infinite;}

.chart-legend{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.chart-legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--slate-600);font-weight:500;}
.chart-legend .dot{width:9px;height:9px;border-radius:50%;}

.role-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.4px;}
.role-tag.superadmin{background:var(--ink-800);color:var(--teal-400);}
.role-tag.admin{background:var(--teal-100);color:var(--teal-700);}
.role-tag.agent{background:var(--amber-100);color:var(--amber-600);}

#global-loader{position:fixed;inset:0;background:var(--paper-50);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}

@media (max-width:900px){

  #sidebar-scrim{display:none;position:fixed;inset:0;background:rgba(11,31,38,0.4);z-index:39;}
  #sidebar-scrim.show{display:block;}
}

const CURRENCY_SYMBOL = '₹'; // change to '৳', '$', etc. to suit your locale
const $ = (sel, root) => (root || document).querySelector(sel);
const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function toNum(v) { const n = parseFloat(String(v).replace(/[, ৳₹$]/g, '')); return isNaN(n) ? 0 : n; }
function formatMoney(v) { return CURRENCY_SYMBOL + toNum(v).toLocaleString('en-US', { maximumFractionDigits: 0 }); }
function formatNum(v) { return toNum(v).toLocaleString('en-US'); }
function formatPct(v) { return (isFinite(v) ? v : 0).toFixed(2) + '%'; }
function normalizeUHID(v) { return (v || '').toString().replace(/\s+/g, '').toUpperCase(); }
function normalizeForCompare(v) { return (v || '').toString().toLowerCase().trim().replace(/\s+/g, ' '); }
function todayISO() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function monthKeyFromDate(iso) { return iso ? iso.slice(0,7) : ''; }
function monthLabel(monthKey) { if(!monthKey) return '—'; const [y,m]=monthKey.split('-'); return MONTH_NAMES[parseInt(m,10)-1] + "'" + y.slice(2); }
function addDaysISO(iso, days) { const d = new Date(iso + 'T00:00:00'); d.setDate(d.getDate() + days); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function formatDateDisplay(iso) { if(!iso) return '—'; const d = new Date(iso + 'T00:00:00'); if (isNaN(d)) return iso; return String(d.getDate()).padStart(2,'0') + ' ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear(); }
function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function debounce(fn, wait) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), wait); }; }

// Ensure a prescription document is presented in the unified shape: { ...fields, tests: [...] }
function normalizePrescriptionRow(r) {
  if (!r) return r;
  if (Array.isArray(r.tests)) return r;
  if (r.testGiven !== undefined) {
    return Object.assign({}, r, { tests: [{ testGiven: r.testGiven, testAmount: r.testAmount || 0, matchStatus: r.matchStatus || (r.testGiven === NO_TEST_LABEL ? 'no-test' : 'leakage'), matchedAmount: r.matchedAmount || 0, matchedBillingRef: r.matchedBillingRef || null }] });
  }
  return Object.assign({}, r, { tests: r.tests || [] });
}

// Flexible date parser: handles Date objects, Excel serials, and common string formats -> 'YYYY-MM-DD' or null
function parseFlexibleDate(value) {
  if (value === null || value === undefined || value === '') return null;
  // SheetJS (cellDates:true) anchors a date-only Excel cell to LOCAL midnight of the intended
  // calendar day (i.e. it effectively uses the browser's own timezone when building the Date
  // object) — NOT UTC midnight. For anyone in a timezone ahead of UTC (like IST), reading that
  // back with UTC getters lands on the previous day; local getters are what's actually correct.
  // The +12h nudge below clears a small (well under a minute) floating-point fuzz in SheetJS's
  // own serial->Date math that can otherwise sit right on a midnight boundary. Verified against
  // real SheetJS output across a wide range of timezones (UTC-8 through UTC+14, including
  // half-hour/quarter-hour offsets) before relying on this.
  if (value instanceof Date && !isNaN(value)) { const nudged = new Date(value.getTime() + 12 * 3600 * 1000); return isoFromParts(nudged.getFullYear(), nudged.getMonth() + 1, nudged.getDate()); }
  if (typeof value === 'number') { // Excel serial date (a fractional part, if any, is just time-of-day and is ignored below)
    const epoch = new Date(Date.UTC(1899, 11, 30));
    const d = new Date(epoch.getTime() + value * 86400000);
    return isoFromParts(d.getUTCFullYear(), d.getUTCMonth()+1, d.getUTCDate());
  }
  let s = String(value).trim();
  // Drop a merged time-of-day so "15-01-2026 14:30:00", "2026-01-15T14:30:00Z", and
  // "15/01/2026 2:30 PM" all reduce to just their date portion before matching.
  s = s.replace(/[T\s]\d{1,2}:\d{2}(:\d{2})?(\.\d+)?\s*(AM|PM|am|pm)?.*$/, '').trim();
  let m;
  if ((m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/))) return isoFromParts(+m[1], +m[2], +m[3]);
  if ((m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/))) return isoFromParts(+m[3], +m[2], +m[1]); // DD-MM-YYYY: day=m[1], month=m[2] (the common convention outside the US)
  if ((m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/))) return isoFromParts(2000 + (+m[3]), +m[2] > 12 ? +m[1] : +m[2], +m[2] > 12 ? +m[2] : +m[1]);
  const d = new Date(s);
  if (!isNaN(d)) return isoFromParts(d.getFullYear(), d.getMonth()+1, d.getDate());
  return null;
}
function isoFromParts(y, m, d) { if(!y||!m||!d) return null; return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }
function isValidISODate(v) { return typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v); }
// Removed unused helper `isoToExcelDate` — dates are handled via other helpers.

function animateCountUp(el, target, opts) {
  const isMoney = opts && opts.money, isPct = opts && opts.pct;
  const start = 0, dur = 900, t0 = performance.now();
  function frame(t) {
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = start + (target - start) * eased;
    el.textContent = isMoney ? formatMoney(val) : isPct ? formatPct(val) : formatNum(Math.round(val));
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ---- Toasts ---- */
function showToast(message, type) {
  type = type || 'info';
  const stack = $('#toast-stack');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const iconName = type === 'success' ? 'checkCircle' : type === 'error' ? 'alertTriangle' : 'info';
  t.innerHTML = icon(iconName) + '<span>' + escapeHtml(message) + '</span>';
  stack.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(30px)'; t.style.transition = 'all .25s ease'; setTimeout(() => t.remove(), 260); }, 3600);
}

async function loadCompanyContext(companyId) {
  const snap = await getDoc(doc(db, 'companies', companyId));
  if (!snap.exists()) throw new Error('Company not found. Contact your Super Admin.');
  const data = snap.data();
  state.companyId = companyId;
  invalidatePrescriptionsCache();
  state.companyName = data.name;
  state.companyActive = data.active !== false;
  state.matchingConfig = Object.assign({}, DEFAULT_MATCHING_CONFIG, data.matchingConfig || {}, { billingMap: Object.assign({}, DEFAULT_MATCHING_CONFIG.billingMap, (data.matchingConfig || {}).billingMap || {}) });
  state.customFields = Array.isArray(data.customFields) ? data.customFields : [];
  await loadMasters();
}

async function loadUserProfile(fbUser) {
  const snap = await getDoc(doc(db, 'users', fbUser.uid));
  if (!snap.exists()) throw new Error('NO_PROFILE');
  const data = snap.data();
  return { uid: fbUser.uid, email: fbUser.email, name: data.name || fbUser.email, role: data.role, companyId: data.companyId || null, canUploadBilling: data.canUploadBilling === true };
}

function beginSession() {
  onAuthStateChanged(auth, async (fbUser) => {
    if (!fbUser) { state.user = null; showLoginScreen(); return; }
    try {
      const profile = await loadUserProfile(fbUser);
      state.user = profile;
      state.isSuperAdmin = profile.role === 'superadmin';
      state.isAgent = profile.role === 'agent';
      if (profile.role === 'admin' || profile.role === 'agent') {
        if (!profile.companyId) throw new Error('Your account is not linked to a company yet. Contact your Super Admin.');
        await loadCompanyContext(profile.companyId);
      }
      renderShellChrome();
      showAppShell();
      navigateTo(state.isSuperAdmin ? 'sa-companies' : 'dashboard');
    } catch (err) {
      console.error(err);
      showToast(err.message === 'NO_PROFILE' ? 'No profile found for this account. Contact your Super Admin.' : friendlyError(err), 'error');
      await signOut(auth);
      showLoginScreen();
    }
  });
}

// date range of prescriptions (with matching re-run afterward to release any billing rows those

// so every query here takes an explicit companyId rather than relying on state.companyId.
function openBulkDeleteModal(companyId, companyName, companyMatchingConfig, initialMasterTab) {
  const firstTab = initialMasterTab || Object.keys(MASTER_DEFS)[0];
  openModal(`
    <div class="modal-head"><h3>Bulk Delete — ${escapeHtml(companyName)}</h3><button class="icon-btn" id="m-x">${icon('x')}</button></div>
    <div class="modal-body">
      <span class="section-label">Prescriptions by Date Range</span>

        <div class="field-wrap" style="width:160px;"><label>From</label><input type="date" id="bd-rx-from"></div>
        <div class="field-wrap" style="width:160px;"><label>To</label><input type="date" id="bd-rx-to"></div>

      <div class="pill-filters" id="bd-master-tabs" style="margin-bottom:12px;">${Object.keys(MASTER_DEFS).map((k) => `<button class="pill ${k === firstTab ? 'active' : ''}" data-t="${k}">${MASTER_DEFS[k].labelPlural}</button>`).join('')}</div>
      <div class="u-between" style="margin-bottom:8px;">
        <label class="checkbox-row"><input type="checkbox" id="bd-select-all"> Select all</label>
        <button class="btn btn-danger-solid btn-sm" id="bd-master-delete" disabled>${icon('trash')} Delete Selected (0)</button>
      </div>
      <div id="bd-master-list" style="max-height:230px;overflow-y:auto;border:1px solid var(--line-100);border-radius:var(--radius-sm);"><div class="u-center" style="padding:30px 0;"><div class="loader-ring"></div></div></div>
    </div>
  `, { wide: true });
  $('#m-x').onclick = closeModal;

  $('#bd-rx-delete').onclick = async () => {
    const from = $('#bd-rx-from').value, to = $('#bd-rx-to').value;
    if (!from || !to) { showToast('Select both From and To dates', 'error'); return; }
    if (from > to) { showToast('From date must be on or before To date', 'error'); return; }
    const btn = $('#bd-rx-delete'); const label = btn.innerHTML; setBtnLoading(btn, true);
    try {
      const rxQuery = query(collection(db, 'companies', companyId, 'prescriptions'), where('date', '>=', from), where('date', '<=', to));
      const countSnap = await getCountFromServer(rxQuery);
      const count = countSnap.data().count;
      setBtnLoading(btn, false, label);
      if (!count) { showToast('No prescriptions found in that date range', 'info'); return; }
      // confirmDialog() replaces the modal entirely, so bdMasterTab is captured now and
      // the whole modal is deliberately re-opened from scratch after the delete below.
      const ok = await confirmDialog(
        `Delete ${count} prescription${count === 1 ? '' : 's'}?`,
        `Every prescription for ${companyName} dated ${formatDateDisplay(from)} to ${formatDateDisplay(to)} will be permanently deleted, and matching will be re-run afterward to release any billing rows they had claimed. This cannot be undone.`,
        `Delete ${count} Row${count === 1 ? '' : 's'}`, true
      );
      if (!ok) return;
      showToast('Deleting…', 'info');
      const snap = await getDocs(rxQuery);
      let batch = writeBatch(db), n = 0;
      for (const d of snap.docs) { batch.delete(d.ref); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
      if (n > 0) await batch.commit();
      await runMatching(companyId, windowDaysFromConfig(companyMatchingConfig));
      showToast(`${snap.docs.length} prescription(s) deleted`, 'success');
      openBulkDeleteModal(companyId, companyName, companyMatchingConfig, bdMasterTab);
    } catch (e) { showToast(friendlyError(e), 'error'); setBtnLoading(btn, false, label); }
  };

  let bdMasterTab = firstTab;
  async function loadBdMasterList(type) {
    bdMasterTab = type;
    $('#bd-master-list').innerHTML = `<div class="u-center" style="padding:30px 0;"><div class="loader-ring"></div></div>`;
    const snap = await getDocs(collection(db, 'companies', companyId, type));
    const rows = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    drawBdMasterList(rows);
  }
  function drawBdMasterList(rows) {
    const def = MASTER_DEFS[bdMasterTab];
    $('#bd-select-all').checked = false;
    updateBdDeleteBtn();
    $('#bd-master-list').innerHTML = rows.length ? rows.map(r => `<label class="checkbox-row" style="padding:9px 12px;border-bottom:1px solid var(--line-100);"><input type="checkbox" class="bd-m-cb" data-id="${r.id}"> ${escapeHtml(r.name)}${r.amount !== undefined ? ' — ' + formatMoney(r.amount) : ''}</label>`).join('')
      : `<div class="empty-state" style="padding:30px 0;">${icon('database')}<h4>No ${def.labelPlural.toLowerCase()}</h4></div>`;
    $$('.bd-m-cb').forEach(cb => cb.addEventListener('change', updateBdDeleteBtn));
  }
  function updateBdDeleteBtn() {
    const n = $$('.bd-m-cb:checked').length;
    const btn = $('#bd-master-delete');
    btn.disabled = n === 0;
    btn.innerHTML = `${icon('trash')} Delete Selected (${n})`;
  }
  $$('#bd-master-tabs .pill').forEach(p => p.addEventListener('click', () => {
    $$('#bd-master-tabs .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    loadBdMasterList(p.dataset.t);
  }));
  $('#bd-select-all').addEventListener('change', (e) => { $$('.bd-m-cb').forEach(cb => cb.checked = e.target.checked); updateBdDeleteBtn(); });
  $('#bd-master-delete').onclick = async () => {
    const ids = $$('.bd-m-cb:checked').map(cb => cb.dataset.id);
    if (!ids.length) return;
    const def = MASTER_DEFS[bdMasterTab];
    // confirmDialog() replaces the modal entirely — re-open fresh afterward rather than
    // trying to update elements that confirmDialog has already torn down.
    const ok = await confirmDialog(
      `Delete ${ids.length} ${def.labelPlural.toLowerCase()}?`,
      `These records will be permanently removed from ${companyName}'s ${def.labelPlural}. Existing prescriptions that reference them keep the old value as free text and are not changed.`,
      `Delete ${ids.length}`, true
    );
    if (!ok) return;
    showToast('Deleting…', 'info');
    try {
      let batch = writeBatch(db), n = 0;
      for (const id of ids) { batch.delete(doc(db, 'companies', companyId, bdMasterTab, id)); n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; } }
      if (n > 0) await batch.commit();
      if (companyId === state.companyId) await loadMasters();
      showToast(`${ids.length} deleted`, 'success');
      openBulkDeleteModal(companyId, companyName, companyMatchingConfig, bdMasterTab);
    } catch (e) { showToast(friendlyError(e), 'error'); }
  };
  loadBdMasterList(firstTab);
}

async function deleteCompanyCascade(companyId) {
  const dumpsSnap = await getDocs(collection(db, 'companies', companyId, 'billingDumps'));
  for (const dDoc of dumpsSnap.docs) await deleteAllInCollection(collection(db, 'companies', companyId, 'billingDumps', dDoc.id, 'rows'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'billingDumps'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'prescriptions'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'doctors'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'tests'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'agents'));
  await deleteAllInCollection(collection(db, 'companies', companyId, 'monthlySummaries'));
  await deleteDoc(doc(db, 'companies', companyId, 'meta', 'dashboardSummary')).catch(() => {});
  const usersSnap = await getDocs(query(collection(db, 'users'), where('companyId', '==', companyId)));
  if (usersSnap.docs.length) { const b = writeBatch(db); usersSnap.docs.forEach(d => b.delete(d.ref)); await b.commit(); }
  await deleteDoc(doc(db, 'companies', companyId));
  invalidatePrescriptionsCache();
  // Note: the linked Firebase Auth sign-in accounts themselves are not deletable from the client
  // SDK for security reasons — remove them from Firebase Console → Authentication if desired.
}

let dashBarChartInstance = null, dashDonutChartInstance = null;

// Converts a summary-doc's raw counters into the same shape computeSummaryStats() returns, so
// every consumer (Dashboard, charts, Reports) can treat the fast precomputed path and the
// full-scan fallback identically.
function summaryDocToStats(d) {
  const testGivenCount = d.testGivenCount || 0, matchedCount = d.matchedCount || 0;
  const prescriptionValue = d.prescriptionValue || 0, conversionValue = d.conversionValue || 0, leakageValue = d.leakageValue || 0;
  return {
    totalPrescription: d.visitCount || 0, totalTestGiven: testGivenCount, totalConversion: matchedCount,
    totalLeakageCount: testGivenCount - matchedCount, totalNoTestCount: d.noTestCount || 0,
    prescriptionValue, conversionValue, leakageValue,
    conversionPct: prescriptionValue > 0 ? (conversionValue / prescriptionValue) * 100 : 0,
    leakagePct: prescriptionValue > 0 ? (leakageValue / prescriptionValue) * 100 : 0,
  };
}
// Dashboard's data source: reads companies/{id}/meta/dashboardSummary (1 read) plus the 6 most
// recent monthlySummaries docs (up to 6 reads) instead of every prescription document. The very
// first time a company is viewed after this feature ships there's no summary doc yet — that one
// visit falls back to a full read (identical to the old behavior) and persists the summary so
// every subsequent visit is fast. This is the only place that full-read cost is ever paid again.
async function getDashboardData() {
  const summarySnap = await getDoc(doc(db, 'companies', state.companyId, 'meta', 'dashboardSummary'));
  if (summarySnap.exists()) {
    const stats = summaryDocToStats(summarySnap.data());
    const monthsSnap = await getDocs(query(collection(db, 'companies', state.companyId, 'monthlySummaries'), orderBy('__name__', 'desc'), fsLimit(6)));
    const monthly = {};
    monthsSnap.docs.forEach(d => { monthly[d.id] = summaryDocToStats(d.data()); });
    return { stats, monthly, rowCount: stats.totalTestGiven + stats.totalNoTestCount };
  }
  const rows = await loadAllPrescriptions();
  const stats = computeSummaryStats(rows);
  const monthlyFull = groupByMonth(rows);
  if (rows.length) await reconcileSummaryDocs(state.companyId, rows);
  const monthly = {};
  Object.keys(monthlyFull).forEach(mk => { if (mk !== 'unknown') monthly[mk] = monthlyFull[mk]; });
  return { stats, monthly, rowCount: rows.length };
}

    return;
  }
  const { stats, monthly, rowCount } = await getDashboardData();

// In-memory cache of the company's prescriptions, shared by Dashboard/Prescriptions/Reports.
// Tagged with the companyId it was fetched for, so a stale cache can never leak across companies
// even if a call site forgets to invalidate it.
let prescriptionsCache = null;
let prescriptionsCacheCompanyId = null;
function invalidatePrescriptionsCache() { prescriptionsCache = null; prescriptionsCacheCompanyId = null; }
async function loadAllPrescriptions(forceRefresh) {
  if (!forceRefresh && prescriptionsCache && prescriptionsCacheCompanyId === state.companyId) return prescriptionsCache;
  const snap = await getDocs(query(collection(db, 'companies', state.companyId, 'prescriptions'), orderBy('date', 'desc')));
  // Normalize documents so each prescription represents a visit and contains a `tests` array.
  const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  prescriptionsCache = docs.map(r => {
    // If this doc is a legacy single-test row, convert to new shape in-memory.
    if (!r.tests) {
      if (r.testGiven !== undefined) {
        const t = {
          testGiven: r.testGiven,
          testAmount: r.testAmount || 0,
          matchStatus: r.matchStatus || (r.testGiven === NO_TEST_LABEL ? 'no-test' : 'leakage'),
          matchedAmount: r.matchedAmount || 0,
          matchedBillingRef: r.matchedBillingRef || null,
        };
        return Object.assign({}, r, { tests: [t] });
      }
      // no explicit tests and no legacy fields -> ensure tests is an empty array
      return Object.assign({}, r, { tests: r.tests || [] });
    }
    return r;
  }).filter(r => !r.deleted);
  prescriptionsCacheCompanyId = state.companyId;
  return prescriptionsCache;
}
function computeSummaryStats(rows) {
  const distinctVisits = new Set(rows.map(r => (r.uhid || '') + '|' + (r.date || '')));
  let totalTestGiven = 0, matchedCount = 0, prescriptionValue = 0, conversionValue = 0, leakageValue = 0, noTestCount = 0;
  rows.forEach(r => {
    const tests = Array.isArray(r.tests) && r.tests.length ? r.tests : (r.testGiven !== undefined ? [{ testGiven: r.testGiven, testAmount: r.testAmount, matchStatus: r.matchStatus, matchedAmount: r.matchedAmount }] : []);
    if (!tests.length) { noTestCount += 1; return; }
    tests.forEach(t => {
      const isNoTest = t.testGiven === NO_TEST_LABEL || t.matchStatus === 'no-test';
      if (isNoTest) { noTestCount += 1; return; }
      totalTestGiven += 1;
      const amt = toNum(t.testAmount);
      prescriptionValue += amt;
      if (t.matchStatus === 'matched') { matchedCount += 1; conversionValue += toNum(t.matchedAmount); }
      else { leakageValue += amt; }
    });
  });
  return {
    totalPrescription: distinctVisits.size, totalTestGiven, totalConversion: matchedCount,
    totalLeakageCount: totalTestGiven - matchedCount, totalNoTestCount: noTestCount,
    prescriptionValue, conversionValue, leakageValue,
    conversionPct: prescriptionValue > 0 ? (conversionValue / prescriptionValue) * 100 : 0,
    leakagePct: prescriptionValue > 0 ? (leakageValue / prescriptionValue) * 100 : 0,
  };
}
function groupByMonth(rows) {
  const map = {};
  rows.forEach(r => { const mk = r.monthKey || monthKeyFromDate(r.date) || 'unknown'; (map[mk] = map[mk] || { rows: [] }).rows.push(r); });
  Object.keys(map).forEach(mk => Object.assign(map[mk], computeSummaryStats(map[mk].rows)));
  return map;
}

/* ---- Precomputed summary accounting (companies/{id}/meta/dashboardSummary + monthlySummaries/{mk}) ----
   Why: the Dashboard's 8 stat cards and Reports' Monthly Summary tab used to be built by reading
   EVERY prescription document on every visit — fine at hundreds of rows, expensive at thousands.
   Instead we maintain running totals that are updated with tiny, targeted increment() writes right
   alongside each prescription write (no extra reads needed for the common cases below), and are
   fully recomputed from scratch only during runMatching() — which already reads every prescription
   anyway, so that reconciliation is free and self-heals any drift from the rarer edge cases noted
   inline. Reading the summary is then a single small document instead of the whole collection. */
const SUMMARY_KEYS = ['testGivenCount', 'noTestCount', 'matchedCount', 'prescriptionValue', 'conversionValue', 'leakageValue'];
function zeroContrib() { const o = {}; SUMMARY_KEYS.forEach(k => o[k] = 0); return o; }
// A row's contribution to each bucket, based on its CURRENT matchStatus — matches
// computeSummaryStats' own classification exactly (matchStatus, not testGiven) so a
// freshly-created row that hasn't been through quickMatchBatch yet is accounted for identically
// to how the full-scan version already treats it.
function rowStatContribution(row) {
  const c = zeroContrib();
  if (!row) return c;
  // Handle both new `tests` array shape and legacy single-test rows.
  const tests = Array.isArray(row.tests) && row.tests.length ? row.tests : (row.testGiven !== undefined ? [row] : []);
  if (!tests.length) return c;
  tests.forEach(t => {
    if (t.testGiven === NO_TEST_LABEL || t.matchStatus === 'no-test') { c.noTestCount += 1; return; }
    c.testGivenCount += 1;
    c.matchedCount += (t.matchStatus === 'matched') ? 1 : 0;
    c.prescriptionValue += toNum(t.testAmount);
    c.conversionValue += (t.matchStatus === 'matched') ? toNum(t.matchedAmount) : 0;
    c.leakageValue += (t.matchStatus === 'matched') ? 0 : toNum(t.testAmount);
  });
  return c;
}
function addContribInto(target, c, mult) { SUMMARY_KEYS.forEach(k => target[k] = (target[k] || 0) + c[k] * mult); }
function isZeroContrib(c) { return SUMMARY_KEYS.every(k => !c[k]); }

// Stages summary-doc deltas into an existing writeBatch for one or more row changes, so the
// prescription writes and the summary update commit atomically together. `changes` is an array
// of { oldRow, newRow, visitDelta }: oldRow/newRow may be null for creation/deletion; visitDelta
// is a caller-supplied +1/-1 for whether this specific change also makes a NEW distinct uhid+date
// visit appear or the LAST remaining row of one disappear (the row data alone can't tell us that
// — it depends on whether other rows still share that uhid+date, which is the caller's job to
// check where it matters). For an edit that moves a row to a different uhid+date AND that change
// affects visit membership on both ends, pass it as two entries — {oldRow, newRow:null,
// visitDelta:-1} and {oldRow:null, newRow, visitDelta:1} — so both the origin and destination
// month/visit get the correct credit/debit; a single combined entry can only attribute the visit
// delta to one side. Every document this touches is written at most once per call.
function stageSummaryChanges(batch, companyId, changes) {
  const totalDelta = zeroContrib();
  let totalVisitDelta = 0;
  const monthDeltas = {};
  function touchMonth(mk) { if (!monthDeltas[mk]) monthDeltas[mk] = { contrib: zeroContrib(), visitDelta: 0 }; return monthDeltas[mk]; }

  (changes || []).forEach(({ oldRow, newRow, visitDelta }) => {
    visitDelta = visitDelta || 0;
    const oldC = rowStatContribution(oldRow), newC = rowStatContribution(newRow);
    const d = zeroContrib(); addContribInto(d, newC, 1); addContribInto(d, oldC, -1);
    addContribInto(totalDelta, d, 1);
    totalVisitDelta += visitDelta;
    const oldMonth = oldRow ? (oldRow.monthKey || monthKeyFromDate(oldRow.date)) : null;
    const newMonth = newRow ? (newRow.monthKey || monthKeyFromDate(newRow.date)) : null;
    const visitMonth = newMonth || oldMonth;
    if (oldMonth === newMonth) {
      if (newMonth) { const m = touchMonth(newMonth); addContribInto(m.contrib, d, 1); m.visitDelta += visitDelta; }
    } else {
      if (oldMonth) { const m = touchMonth(oldMonth); addContribInto(m.contrib, oldC, -1); if (visitMonth === oldMonth) m.visitDelta += visitDelta; }
      if (newMonth) { const m = touchMonth(newMonth); addContribInto(m.contrib, newC, 1); if (visitMonth === newMonth) m.visitDelta += visitDelta; }
    }
  });

  if (totalVisitDelta !== 0 || !isZeroContrib(totalDelta)) {
    batch.set(doc(db, 'companies', companyId, 'meta', 'dashboardSummary'), {
      visitCount: increment(totalVisitDelta), testGivenCount: increment(totalDelta.testGivenCount), noTestCount: increment(totalDelta.noTestCount),
      matchedCount: increment(totalDelta.matchedCount), prescriptionValue: increment(totalDelta.prescriptionValue),
      conversionValue: increment(totalDelta.conversionValue), leakageValue: increment(totalDelta.leakageValue), updatedAt: serverTimestamp(),
    }, { merge: true });
  }
  Object.keys(monthDeltas).forEach(mk => {
    const m = monthDeltas[mk];
    if (m.visitDelta === 0 && isZeroContrib(m.contrib)) return;
    batch.set(doc(db, 'companies', companyId, 'monthlySummaries', mk), {
      monthKey: mk, visitCount: increment(m.visitDelta), testGivenCount: increment(m.contrib.testGivenCount), noTestCount: increment(m.contrib.noTestCount),
      matchedCount: increment(m.contrib.matchedCount), prescriptionValue: increment(m.contrib.prescriptionValue),
      conversionValue: increment(m.contrib.conversionValue), leakageValue: increment(m.contrib.leakageValue), updatedAt: serverTimestamp(),
    }, { merge: true });
  });
}

// Full, exact recomputation from a complete row set — the reconciliation anchor. Called by
// runMatching() (which already has every row in memory, so this adds no extra reads) and by the
// one-time bootstrap the first time a company's Dashboard loads after this feature ships. Uses
// set() (overwrite), not increment(), and explicitly zeroes out any month that no longer has any
// rows so a month that's been fully deleted/moved-away-from doesn't leave stale numbers behind.
async function reconcileSummaryDocs(companyId, rows) {
  const overall = computeSummaryStats(rows);
  const monthly = groupByMonth(rows);
  const existingMonthsSnap = await getDocs(collection(db, 'companies', companyId, 'monthlySummaries'));
  const staleMonths = existingMonthsSnap.docs.map(d => d.id).filter(mk => !monthly[mk]);

  let batch = writeBatch(db), n = 0;
  const flush = async () => { if (n > 0) { await batch.commit(); batch = writeBatch(db); n = 0; } };

  batch.set(doc(db, 'companies', companyId, 'meta', 'dashboardSummary'), {
    visitCount: overall.totalPrescription, testGivenCount: overall.totalTestGiven, noTestCount: overall.totalNoTestCount,
    matchedCount: overall.totalConversion, prescriptionValue: overall.prescriptionValue,
    conversionValue: overall.conversionValue, leakageValue: overall.leakageValue,
    updatedAt: serverTimestamp(), reconciledAt: serverTimestamp(),
  }, { merge: true });
  n++;

  for (const mk of Object.keys(monthly)) {
    if (mk === 'unknown') continue;
    const s = monthly[mk];
    batch.set(doc(db, 'companies', companyId, 'monthlySummaries', mk), {
      monthKey: mk, visitCount: s.totalPrescription, testGivenCount: s.totalTestGiven, noTestCount: s.totalNoTestCount,
      matchedCount: s.totalConversion, prescriptionValue: s.prescriptionValue, conversionValue: s.conversionValue, leakageValue: s.leakageValue,
      updatedAt: serverTimestamp(),
    }, { merge: true });
    n++; if (n >= 450) await flush();
  }
  for (const mk of staleMonths) {
    batch.set(doc(db, 'companies', companyId, 'monthlySummaries', mk), {
      monthKey: mk, visitCount: 0, testGivenCount: 0, noTestCount: 0, matchedCount: 0, prescriptionValue: 0, conversionValue: 0, leakageValue: 0,
      updatedAt: serverTimestamp(),
    }, { merge: true });
    n++; if (n >= 450) await flush();
  }
  await flush();
  return overall;
}

let rxPage = 1;
const RX_PAGE_SIZE = 50;
let rxFilterStatus = 'all', rxSearchTerm = '', rxDateFrom = '', rxDateTo = '';
// 'paginated': cheap server-cursor pages, only ever reads the rows actually shown — the default,
// no-filter view. 'filtered': the full (cached) dataset, filtered client-side exactly as before —
// switched into the instant any search/filter is used, since Firestore can't do free-text
// substring search server-side, so that case needs the whole dataset in memory regardless.
let rxMode = 'paginated';
let rxCursors = [null];
let rxServerHasMore = false;
let rxServerTotalCount = null;

function rxFiltersActive() { return rxFilterStatus !== 'all' || !!rxSearchTerm || !!rxDateFrom || !!rxDateTo; }

async function onRxFilterChanged() {

async function loadRxServerPage() {
  $('#rx-table-wrap').innerHTML = `<div class="u-center" style="padding:60px 0;"><div class="loader-ring"></div></div>`;
  $('#rx-pager').innerHTML = '';
  let q = query(collection(db, 'companies', state.companyId, 'prescriptions'), orderBy('date', 'desc'), fsLimit(RX_PAGE_SIZE + 1));
  const cursor = rxCursors[rxPage - 1];
  if (cursor) q = query(q, startAfter(cursor));
  const [snap, countRes] = await Promise.all([
    getDocs(q),
    rxServerTotalCount === null ? getCountFromServer(collection(db, 'companies', state.companyId, 'prescriptions')).catch(() => null) : Promise.resolve(null),
  ]);
  if (countRes) rxServerTotalCount = countRes.data().count;
  const docs = snap.docs;
  rxServerHasMore = docs.length > RX_PAGE_SIZE;
  const pageDocs = rxServerHasMore ? docs.slice(0, RX_PAGE_SIZE) : docs;
  if (pageDocs.length) rxCursors[rxPage] = pageDocs[pageDocs.length - 1];
  const rows = pageDocs.map(d => normalizePrescriptionRow(Object.assign({ id: d.id }, d.data()))).filter(r => !r.deleted);
  renderRxTableRows(rows, {
    countLabel: rxServerTotalCount !== null ? `${rxServerTotalCount} rows · Page ${rxPage}` : `Page ${rxPage}`,
    hasPrev: rxPage > 1, hasNext: rxServerHasMore,
    onPrev: () => { rxPage--; loadRxServerPage(); },

function rxRowHtml(r) {

  </tr>`;
}

function initSearchSelect(id, options, initialValue, onSelect, blankLabel) {
  const root = document.getElementById(id);
  if (!root) return null;
  let opts = options.slice();
  if (initialValue && !opts.some(o => o.value === initialValue)) opts = [{ value: initialValue, label: initialValue + ' (custom)' }].concat(opts);
  let value = initialValue || '';
  // When blankLabel is given and the current value equals it, show an empty box (with the
  // label as a grayed placeholder) instead of writing the label in as literal text — so a
  // field can have a real default value without forcing the user to delete pre-filled text
  // before they can start typing a search term.
  function labelFor(v) { if (blankLabel !== undefined && v === blankLabel) return ''; const o = opts.find(x => x.value === v); return o ? o.label : ''; }
  root.innerHTML = `<input type="text" class="ss-input" autocomplete="off" placeholder="${blankLabel !== undefined ? escapeHtml(blankLabel) : 'Type to search…'}" value="${escapeHtml(labelFor(value))}"><div class="ss-dropdown hidden"></div>`;
  const input = root.querySelector('.ss-input'), dropdown = root.querySelector('.ss-dropdown');
  let activeIndex = -1, visible = [];

  function renderList(term) {
    const t = (term || '').trim().toLowerCase();
    visible = t ? opts.filter(o => o.label.toLowerCase().includes(t)) : opts;
    activeIndex = -1;
    dropdown.innerHTML = visible.length ? visible.slice(0, 60).map((o, i) => `<div class="ss-option" data-i="${i}">${escapeHtml(o.label)}</div>`).join('') : `<div class="ss-empty">No matches</div>`;
    dropdown.classList.remove('hidden');
    dropdown.querySelectorAll('.ss-option').forEach(el => el.addEventListener('mousedown', (e) => { e.preventDefault(); choose(visible[+el.dataset.i]); }));
  }
  function choose(opt) {
    value = opt ? opt.value : (blankLabel !== undefined ? blankLabel : '');
    input.value = labelFor(value);
    dropdown.classList.add('hidden');
    if (onSelect) onSelect(value, opt);
  }
  function highlight(i) {
    activeIndex = i;
    dropdown.querySelectorAll('.ss-option').forEach((el, idx) => el.classList.toggle('active', idx === i));
    const el = dropdown.querySelector(`.ss-option[data-i="${i}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }
  input.addEventListener('focus', () => renderList(''));
  input.addEventListener('input', () => renderList(input.value));
  input.addEventListener('keydown', (e) => {
    if (dropdown.classList.contains('hidden') && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) { renderList(input.value); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); highlight(Math.min(activeIndex + 1, visible.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); highlight(Math.max(activeIndex - 1, 0)); }
    else if (e.key === 'Enter') { if (activeIndex >= 0 && visible[activeIndex]) { e.preventDefault(); e.stopPropagation(); choose(visible[activeIndex]); } }
    else if (e.key === 'Escape') { dropdown.classList.add('hidden'); }
  });
  input.addEventListener('blur', () => {
    setTimeout(() => {
      dropdown.classList.add('hidden');
      input.value = labelFor(value);
    }, 150);
  });
  return {
    getValue: () => value,
    setOptions: (newOptions, newValue) => {
      opts = newOptions.slice();
      if (newValue !== undefined) value = newValue;
      if (value && !opts.some(o => o.value === value)) opts = [{ value, label: value + ' (custom)' }].concat(opts);
      input.value = labelFor(value);
    },
  };
}
function bindUhidNormalize(inputEl) {
  inputEl.addEventListener('input', () => {
    const before = inputEl.value, pos = inputEl.selectionStart;
    const after = normalizeUHID(before);
    inputEl.value = after;
    const newPos = Math.max(0, pos - (before.length - after.length));
    inputEl.setSelectionRange(newPos, newPos);
  });
}

function slugifyFieldKey(label, existingFields) {
  const base = label.toLowerCase().trim().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'field';
  let key = base, n = 2;

// A short, fixed list of user-editable prescription fields the history log tracks by name —
// deliberately not a generic deep-diff engine (custom fields are flagged as changed but not
// itemized), which is what keeps this simple rather than a full structural diff.
const RX_AUDIT_FIELDS = [
  { key: 'date', label: 'Date' }, { key: 'uhid', label: 'UHID' }, { key: 'patientName', label: 'Patient Name' },
  { key: 'consultant', label: 'Consultant' }, { key: 'testGiven', label: 'Test Given' }, { key: 'testAmount', label: 'Test Amount' },
  { key: 'consultationFollowUp', label: 'Consultation Follow Up' }, { key: 'testFollowUp', label: 'Test Follow Up' }, { key: 'remarks', label: 'Remarks' },
];
function computeFieldChanges(oldRow, newRow) {
  const changes = [];
  RX_AUDIT_FIELDS.forEach(f => {
    const from = oldRow[f.key], to = newRow[f.key];
    const fromStr = (from === undefined || from === null) ? '' : String(from);
    const toStr = (to === undefined || to === null) ? '' : String(to);
    if (fromStr !== toStr) changes.push({ field: f.key, label: f.label, from: fromStr, to: toStr });
  });
  if (JSON.stringify(oldRow.custom || {}) !== JSON.stringify(newRow.custom || {})) changes.push({ field: 'custom', label: 'Additional Details', from: '', to: '' });
  return changes;
}
// Stages one append-only audit-log entry under a prescription's history subcollection, in the
// same batch as the prescription write itself. ref may be a DocumentReference (existing/new

function stageHistoryEntry(batch, ref, entry) {
  batch.set(doc(collection(ref, 'history')), Object.assign({ at: serverTimestamp() }, entry));
}

        for (const rowEl of rowEls) {

          const testAmount = toNum(rowEl.querySelector('.tr-amount').value);
          if (!testGiven) continue;
          tests.push({ testGiven, testAmount, matchStatus: testGiven === NO_TEST_LABEL ? 'no-test' : 'leakage', matchedAmount: 0, matchedBillingRef: null });
        }
        if (!tests.length) { showToast('Select at least one test', 'error'); setBtnLoading(btn, false, `${icon('check')} Save Prescription`); return; }
        const withDefaults = { date, uhid: uhidVal, patientName, consultant, enteredBy: state.user.name, enteredByUid: state.user.uid, consultationFollowUp: cfu, testFollowUp: tfu, remarks, tests, monthKey: monthKeyFromDate(date), custom, createdAt: serverTimestamp() };
        const batch = writeBatch(db);
        const ref = doc(collection(db, 'companies', state.companyId, 'prescriptions'));
        batch.set(ref, withDefaults);
        stageHistoryEntry(batch, ref, { action: 'created', byUid: state.user.uid, byName: state.user.name });
        // Single visit document — this is a new distinct visit
        stageSummaryChanges(batch, state.companyId, [{ oldRow: null, newRow: withDefaults, visitDelta: 1 }]);
        await batch.commit();
        savedRefs = [ref];
        await quickMatchBatch(savedRefs);
        showSaveFlash(tests.length > 1 ? `${tests.length} tests saved in one prescription` : 'Saved');
        // Stay on a fresh, blank form instead of returning to the list — the flash overlay
        // doesn't block input, so the next entry can start immediately.
        renderPrescriptionFormView(content);
      }
    } catch (err) {
      showToast(friendlyError(err), 'error');
      setBtnLoading(btn, false, `${icon('check')} ${isEdit ? 'Save Changes' : 'Save Prescription'}`);
    }
  });
}

async function deletePrescriptionRow(id, row) {
  const isSoft = state.isAgent; // agents can't truly delete — enforced by firestore.rules too, not just this UI check
  const ok = await confirmDialog(
    'Delete this prescription row?',
    isSoft
      ? `${row.patientName} — ${row.testGiven} (${formatDateDisplay(row.date)}) will be moved to the Recycle Bin. Your admin can restore it or remove it permanently.`
      : `${row.patientName} — ${row.testGiven} (${formatDateDisplay(row.date)}) will be permanently removed.`,
    'Delete', true
  );
  if (!ok) return;
  try {
    const siblingCount = await getCountFromServer(query(collection(db, 'companies', state.companyId, 'prescriptions'), where('uhid', '==', row.uhid), where('date', '==', row.date)));
    const isLastOfVisit = siblingCount.data().count <= 1;
    const ref = doc(db, 'companies', state.companyId, 'prescriptions', id);
    const batch = writeBatch(db);
    if (isSoft) {
      batch.update(ref, { deleted: true, deletedAt: serverTimestamp(), deletedByUid: state.user.uid, deletedByName: state.user.name });
      stageHistoryEntry(batch, ref, { action: 'deleted', byUid: state.user.uid, byName: state.user.name });
    } else {
      batch.delete(ref);
    }
    // Soft- and hard-deleted rows both stop counting toward the live totals immediately.
    stageSummaryChanges(batch, state.companyId, [{ oldRow: row, newRow: null, visitDelta: isLastOfVisit ? -1 : 0 }]);
    await batch.commit();
    invalidatePrescriptionsCache();
    showToast('Deleted', 'success');
    navigateTo('prescriptions');
  }
  catch (e) { showToast(friendlyError(e), 'error'); }
}

function detectPrescriptionColumnMapping(headers) {

  return {
    date: find(['date']), uhid: find(['uhid', 'mr no', 'mr number', 'mrn', 'patient id', 'reg no']),
    patientName: find(['patient name', 'patient']), consultant: find(['consultant', 'doctor', 'physician']),

    consultationFollowUp: find(['consultation follow', 'consultation']), testFollowUp: find(['test follow']),

  };
}

function buildPrescriptionImportRow(r, map) {
  const get = (key) => (map[key] ? (r[map[key]] || '') : '').toString().trim();
  const testGiven = get('testGiven') || NO_TEST_LABEL;
  return {
    date: map.date ? parseFlexibleDate(r[map.date]) : null,
    uhid: normalizeUHID(map.uhid ? r[map.uhid] : ''),
    patientName: get('patientName'),
    consultant: get('consultant'),
    testGiven,
    testAmount: testGiven === NO_TEST_LABEL ? 0 : toNum(map.testAmount ? r[map.testAmount] : 0),
    consultationFollowUp: (map.consultationFollowUp ? parseFlexibleDate(r[map.consultationFollowUp]) : null) || '',
    testFollowUp: (map.testFollowUp ? parseFlexibleDate(r[map.testFollowUp]) : null) || '',
    remarks: get('remarks'),
    enteredBy: get('enteredBy'),
    custom: customFieldsFromImportRow(r),
  };
}
async function bulkImportPrescriptions(rows) {
  // Group incoming rows by visit (uhid + date) so each visit becomes one prescription doc
  const grouped = {};
  for (const r of rows) {
    const visitKey = (r.uhid || '') + '|' + (r.date || '');
    if (!grouped[visitKey]) grouped[visitKey] = Object.assign({}, r, { tests: [] });
    grouped[visitKey].tests.push({ testGiven: r.testGiven, testAmount: r.testAmount, matchStatus: r.testGiven === NO_TEST_LABEL ? 'no-test' : 'leakage', matchedAmount: 0, matchedBillingRef: null });
  }
  const entries = Object.values(grouped);
  let batch = writeBatch(db), n = 0;
  const summaryChanges = [];
  for (const e of entries) {
    const withDefaults = Object.assign({}, e, { monthKey: monthKeyFromDate(e.date), tests: e.tests, createdAt: serverTimestamp() });
    batch.set(doc(collection(db, 'companies', state.companyId, 'prescriptions')), withDefaults);
    n++; if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; }
    // One visit per grouped entry — visitDelta 1 if this is a new visit in the import batch.
    summaryChanges.push({ oldRow: null, newRow: withDefaults, visitDelta: 1 });
  }
  if (n > 0) await batch.commit();
  for (let i = 0; i < summaryChanges.length; i += 450) {
    const summaryBatch = writeBatch(db);
    stageSummaryChanges(summaryBatch, state.companyId, summaryChanges.slice(i, i + 450));
    await summaryBatch.commit();
  }
  invalidatePrescriptionsCache();
}

async function importMasterRows(type, rows) {
  const existing = state[type];
  let batch = writeBatch(db), n = 0;
  for (const r of rows) {
    const match = existing.find(e => (e.name || '').toLowerCase() === (r.name || '').toLowerCase());
    const ref = match ? doc(db, 'companies', state.companyId, type, match.id) : doc(collection(db, 'companies', state.companyId, type));
    batch.set(ref, match ? r : Object.assign({}, r, { createdAt: serverTimestamp() }), { merge: true });
    n++;
    if (n === 450) { await batch.commit(); batch = writeBatch(db); n = 0; }
  }
  if (n > 0) await batch.commit();
  await loadMasters();
}

async function restorePrescription(row) {
  const ok = await confirmDialog('Restore this prescription?', `${row.patientName} — ${row.testGiven} will be restored and re-matched against current billing data.`, 'Restore', false);
  if (!ok) return;
  try {
    const ref = doc(db, 'companies', state.companyId, 'prescriptions', row.id);
    // Counts every doc sharing this uhid+date, including this one (still deleted at query time).
    // If it's the only one, restoring clearly reintroduces the visit; if others already exist
    // they might themselves be active or also deleted — a rare, cheap-to-miss edge case that
    // self-corrects on the next Run Matching, same convention used throughout the app.
    const siblingCount = await getCountFromServer(query(collection(db, 'companies', state.companyId, 'prescriptions'), where('uhid', '==', row.uhid), where('date', '==', row.date)));
    const restoredRow = { ...row, deleted: false, deletedAt: null, deletedByUid: null, deletedByName: null };
    const batch = writeBatch(db);
    batch.update(ref, { deleted: false, deletedAt: null, deletedByUid: null, deletedByName: null });
    stageSummaryChanges(batch, state.companyId, [{ oldRow: null, newRow: restoredRow, visitDelta: siblingCount.data().count <= 1 ? 1 : 0 }]);
    stageHistoryEntry(batch, ref, { action: 'restored', byUid: state.user.uid, byName: state.user.name });
    await batch.commit();
    await quickMatchBatch([ref]); // re-evaluate against current billing data rather than staying frozen at its pre-deletion status
    invalidatePrescriptionsCache();
    showToast('Restored', 'success');
    loadAndRenderRecycleBin();
  } catch (e) { showToast(friendlyError(e), 'error'); }
}
async function purgePrescription(row) {
  const ok = await confirmDialog('Permanently delete this prescription?', `${row.patientName} — ${row.testGiven} will be permanently removed. This cannot be undone.`, 'Delete Permanently', true);
  if (!ok) return;
  try {
    // Already excluded from every stat since it was soft-deleted — purging doesn't touch the
    // summary again (that would double-count the removal).
    await deleteDoc(doc(db, 'companies', state.companyId, 'prescriptions', row.id));
    showToast('Permanently deleted', 'success');
    loadAndRenderRecycleBin();
  } catch (e) { showToast(friendlyError(e), 'error'); }
}

function readFileAsRows(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const headers = (XLSX.utils.sheet_to_json(ws, { header: 1 })[0] || []).filter(h => h !== undefined && h !== '');
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        resolve({ headers, rows });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsArrayBuffer(file);
  });
}
function detectColumnMapping(headers, savedMap) {
  const guess = { uhid: '', date: '', amount: '', testName: '', patientName: '' };
  const lower = headers.map(h => (h || '').toString().toLowerCase());
  function find(patterns) { for (const p of patterns) { const idx = lower.findIndex(h => h.includes(p)); if (idx !== -1) return headers[idx]; } return ''; }
  guess.uhid = find(['uhid', 'patient id', 'patientid', 'uh id', 'mrn', 'mr no', 'mr number', 'medical record', 'reg no', 'registration']);
  guess.date = find(['date', 'bill date', 'visit date', 'txn date']);
  guess.amount = find(['amount', 'value', 'bill amt', 'billed', 'net amount', 'total', 'charges', 'fee']);
  guess.testName = find(['test name', 'test', 'item', 'service', 'procedure', 'particulars', 'description']);
  guess.patientName = find(['patient name', 'patient', 'name']);
  if (savedMap) Object.keys(guess).forEach(k => { if (savedMap[k] && headers.includes(savedMap[k])) guess[k] = savedMap[k]; });
  return guess;
}
